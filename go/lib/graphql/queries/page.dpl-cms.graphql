query getPageByPath($path: String!) {
  route(path: $path) {
    __typename
    ...routeRedirect
    ... on RouteInternal {
      url
      entity {
        ... on NodeGoPage {
          __typename
          paragraphs {
            ...goVideo
            ...goVideoBundleAutomatic
            ...goVideoBundleManual
            ...goVideoBundleVerticalManual
            ...goMaterialSliderAutomatic
            ...goMaterialSliderManual
            ...goLinkbox
            ...goTextBody
            ...goImages
          }
        }
      }
    }
  }
}
