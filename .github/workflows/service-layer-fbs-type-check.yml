name: "Service Layer / FBS / Type check"

on:
  pull_request:
    paths:
      - 'packages/node/service-layer/fbs/**'
      - '.github/workflows/service-layer-fbs-*.yml'

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/node/service-layer/fbs

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: "packages/node/service-layer/fbs/.nvmrc"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run typescript compile check
        run: yarn typecheck
