---
name: Design / Branch Release

on:
  push:
    branches-ignore:
      # Dependabot does not have permissions to create releases
      - 'dependabot/**'

jobs:
  create_release:
    name: Design / Create release on branch changes
    uses: ./.github/workflows/common-release-workflow.yml
    with:
      project: 'design-system'
      sha: ${{ github.sha }}
      branch: ${{ github.ref_name }}
      dev_release: true

  create_npm_package:
    name: Design / Create and Release NPM package
    runs-on: ubuntu-latest
    needs: create_release
    # Temporarily disabled, whilst we're working in the wrong ORG.
    if: false

    env:
      NPM_VERSION: "0.0.0-${{ github.sha }}"
      TAG_NAME: ${{ needs.create_release.outputs.tag_name }}

    steps:
      - name: Create NPMRC
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "[@${{ github.repository_owner }}]:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
          echo 'registry "https://registry.yarnpkg.com"' >> ~/.yarnrc      

      - name: Release NPM package
        run: |
          npm version ${{ env.NPM_VERSION }} --no-git-tag-version
          echo ${{ env.TAG_NAME }}
          cat package.json
          npm publish --tag ${{ env.TAG_NAME }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Adding summary
        run: |
          echo "Npm package created 🚀. Version: ${{ env.NPM_VERSION }}" >> $GITHUB_STEP_SUMMARY




