---
name: Design / Branch Release

on:
  push:
    branches-ignore:
      # Dependabot does not have permissions to create releases
      - 'dependabot/**'

jobs:
  create_release:
    name: Design / Create release on branch changes
    uses: ./.github/workflows/common-release-workflow.yml
    with:
      project: 'design-system'
      sha: ${{ github.sha }}
      branch: ${{ github.ref_name }}
      dev_release: true

  create_npm_package:
    name: Design / Create and Release NPM package on branch changes
    uses: ./.github/workflows/design-system-npm-workflow.yml
    needs: create_release
    with:
      npm_version: 0.0.0-${{ needs.create_release.outputs.tag_name }}
      tag_name: ${{ needs.create_release.outputs.tag_name }}
      latest: false
