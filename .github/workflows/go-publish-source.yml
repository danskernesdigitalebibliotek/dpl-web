# This workflow takes care of building and publishing the source code of the Danish Public Libraries CMS.
name: Go / Publish source
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all

    defaults:
      run:
        working-directory: go

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/cache@v5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}

      # Validate the format of the tag. We only want to react on a precise pattern.
      - name: Detect release tag
        id: detect_tag
        run: |
          if [[ "${{ github.ref }}" =~ ^refs\/tags\/([0-9]+\.[0-9]+\.[0-9]+|[a-zA-Z]+-[0-9]+\.[0-9]+)$ ]]
          then
            echo "IS_RELEASE_TAG=true" >> "$GITHUB_OUTPUT"
          else
            echo "IS_RELEASE_TAG=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v6
        if: ${{ steps.detect_tag.outputs.IS_RELEASE_TAG == 'true' }}
        with:
          node-version-file: "go/.nvmrc"
          cache: "yarn"
          cache-dependency-path: "go/yarn.lock"

      - name: Install dependencies
        if: ${{ steps.detect_tag.outputs.IS_RELEASE_TAG == 'true' }}
        run: yarn install --frozen-lockfile

      - name: Run CI checks
        if: ${{ steps.detect_tag.outputs.IS_RELEASE_TAG == 'true' }}
        run: |
          if ! yarn ci-check; then
            echo "Code quality checks failed"
            exit 1
          fi

      # Extract version from tag.
      - name: Get version
        id: get_version
        run: |
          echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
        if: ${{ steps.detect_tag.outputs.IS_RELEASE_TAG == 'true' }}
      # Write version to .version file.
      - name: Create .version file
        run: |
          echo "{\"version\": \"${{ steps.get_version.outputs.RELEASE_TAG }}\"}" > .version
        if: ${{ steps.detect_tag.outputs.IS_RELEASE_TAG == 'true' }}
      # Install go-task since we need it for building the source package.
      - name: Install go-task
        uses: arduino/setup-task@v2
        if: ${{ steps.detect_tag.outputs.IS_RELEASE_TAG == 'true' }}
      - name: Build and publish source
        run: |
          echo "Publishing tag: $RELEASE_TAG"
          RELEASE_IMAGE_TAG=$RELEASE_TAG RELEASE_IMAGE_REGISTRY=ghcr.io/${{ github.repository_owner}} task source:deploy
        if: ${{ steps.detect_tag.outputs.IS_RELEASE_TAG == 'true' }}
        env:
          CR_PAT: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.get_version.outputs.RELEASE_TAG }}

      - name: Update GitHub release with package link
        if: ${{ steps.detect_tag.outputs.IS_RELEASE_TAG == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          IMAGE_NAME: dpl-go-node
          PKG_URL: https://github.com/${{ github.repository }}/pkgs/container/dpl-go-node
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" --repo "${GITHUB_REPOSITORY}" >/dev/null; then
            echo "No release found for tag $TAG, skipping release update"
            exit 0
          fi
          BODY=$(gh release view "$TAG" --repo "${GITHUB_REPOSITORY}" --json body -q .body || echo "")
          if echo "$BODY" | grep -q "dpl-go-node"; then
            echo "Release already links to Go package, skipping"
            exit 0
          fi
          if echo "$BODY" | grep -q "## Container images"; then
            NEW_BODY="$BODY"$'\n'"- **Go source:** [\`$IMAGE_NAME:$TAG\`]($PKG_URL?tag=$TAG)"
          else
            NEW_BODY="$BODY"$'\n\n'"## Container images"$'\n\n'"- **Go source:** [\`$IMAGE_NAME:$TAG\`]($PKG_URL?tag=$TAG)"
          fi
          echo "$NEW_BODY" | gh release edit "$TAG" --repo "${GITHUB_REPOSITORY}" --notes-file -

      - name: Adding summary
        run: |
          echo "Source image was successfully build (version: ${{ github.ref }}) 🚀😎" >> "$GITHUB_STEP_SUMMARY"
