name: React / Build and test

on:
  pull_request:
    paths:
      - 'react/**'
      - '.github/workflows/react-*.yml'

jobs:
  stylelint:
    name: React / Lint .scss
    if: '!github.event.deleted'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: 'react/.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'react/package-lock.json'
          registry-url: 'https://npm.pkg.github.com'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Dependencies
        run: npm ci --legacy-peer-deps
      - name: stylelint
        uses: reviewdog/action-stylelint@v1
        with:
          github_token: ${{ secrets.github_token }}
          reporter: github-pr-check
          stylelint_input: 'src/**/*.scss'
          workdir: 'react'
      - name: Lint SCSS
        run: npm run lint:scss

  typescript:
    name: React / Typescript compile check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: 'react/.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'react/package-lock.json'
          registry-url: 'https://npm.pkg.github.com'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Dependencies
        run: npm ci --legacy-peer-deps
      - name: Run typescript compile check
        run: npx tsc --noEmit

  eslint:
    name: React / Lint .js and .jsx
    if: '!github.event.deleted'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: 'react/.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'react/package-lock.json'
          registry-url: 'https://npm.pkg.github.com'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: eslint
        uses: reviewdog/action-eslint@v1
        with:
          github_token: ${{ secrets.github_token }}
          reporter: github-pr-check
          eslint_flags: '.'
          workdir: react
      - name: Lint Javascript
        run: npm run lint:js

  markdownlint:
    name: React / Lint markdown
    if: '!github.event.deleted'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: 'react/.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'react/package-lock.json'
          registry-url: 'https://npm.pkg.github.com'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Dependencies
        run: npm ci --legacy-peer-deps
      - name: Install problem matcher
        uses: xt0rted/markdownlint-problem-matcher@v3
      - name: Lint markdown
        run: npm run lint:markdown

