name: React / Build

on:
  push:
    paths:
      - 'react/**'
      - '.github/workflows/react-*.yml'
  pull_request:
    paths:
      - 'react/**'
      - '.github/workflows/react-*.yml'

jobs:
  build:
    name: React / Build artifacts
    if: '!github.event.deleted'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react
    steps:
      - uses: actions/checkout@v6
        with:
          # Required to fetch all commits and tags
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: 'react/.nvmrc'
          cache: 'yarn'
          cache-dependency-path: 'react/yarn.lock'
          registry-url: 'https://npm.pkg.github.com'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Dependencies
        run: yarn install --frozen-lockfile
      - name: Build artifacts
        run: |
          yarn build:css:prod
          VERSION_FILE_NAME=$GITHUB_REPOSITORY \
          VERSION_FILE_VERSION=$(git describe --tags --exclude=latest) \
          yarn build:js:prod --json webpack-stats.json
      - name: Upload build
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: react/dist
      - name: Send webpack stats to RelativeCI
        uses: relative-ci/agent-action@v3
        with:
          key: ${{ secrets.RELATIVE_CI_KEY_REACT }}
          token: ${{ secrets.GITHUB_TOKEN }}
          webpackStatsFile: ./react/webpack-stats.json
