---
name: CMS / Cypress workflow
on:
  workflow_call:
    inputs:
      # e.g. "unmapped" from "ci:cypress:unmapped"
      id:
        required: true
        type: string

jobs:
  Cypress:
    name: CMS / Cypress / ${{ inputs.id }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms

    steps:
      - uses: actions/checkout@v6
        with:
          # Our Taskfile requires a proper checkout to function because of
          # certain vars.
          fetch-depth: 0

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup site
        run: task ci:reset

      - name: Run Cypress
        run: task ci:cypress:${{ inputs.id }}

      - name: Archive videoes
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-${{ inputs.id }}-videos
          path: cms/cypress/videos

      - name: Archive screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-${{ inputs.id }}-screenshots
          path: cms/cypress/screenshots
