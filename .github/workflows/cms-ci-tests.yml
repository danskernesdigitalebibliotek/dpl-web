# These workflows takes care of various CI tests.
on:
  pull_request:
    paths:
      - 'cms/**'
      - '.github/workflows/cms-*.yml'
name: CMS / CI Tests
env:
  PHP_VERSION: 8.3
  COMPOSER_VERSION: v2

# Detect if this action is already running, and cancel it.
# This most likely happened because a second push has been made to a branch.
concurrency:
  group: ${{ github.repository_id }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  BuildImages:
    name: CMS / Build Docker images
    runs-on: ubuntu-latest
    permissions:
      packages: write
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Build images
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml build
      - name: Add dev dependencies to CLI image
        run: |
          docker run --name cli-dev cms-cli composer install --no-interaction --no-progress
          docker commit cli-dev cms-cli
          docker rm cli-dev
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Tag and push images to GHCR
        env:
          TAG: ci-${{ github.sha }}
          REGISTRY: ghcr.io/${{ github.repository_owner }}
        run: |
          for service in cli php nginx varnish node-chrome; do
            docker tag cms-${service} ${REGISTRY}/dpl-cms-${service}:${TAG}
            docker push ${REGISTRY}/dpl-cms-${service}:${TAG}
          done

  ValidateComposer:
    name: CMS / Validate Composer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v6
      - name: Setup PHP, with composer and extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: none
          tools: composer:${{ env.COMPOSER_VERSION }}
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ hashFiles('cms/composer.lock') }}
          restore-keys: composer-
      - name: Validate composer.json
        run: |
          composer validate --no-check-all --no-check-publish
      - name: Install Dependencies
        run: |
          composer install --no-interaction --no-progress
      - name: Ensure install does not modify VCS
        run: git diff --exit-code

  Phpcs:
    name: CMS / Check code style
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
    - uses: actions/checkout@v6
    - name: Setup PHP, with composer and extensions
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ env.PHP_VERSION }}
        tools: composer:${{ env.COMPOSER_VERSION }}, cs2pr
        coverage: none
        extensions: gd
    - name: Get Composer cache directory
      id: composer-cache
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
    - name: Cache Composer packages
      uses: actions/cache@v4
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: composer-${{ hashFiles('cms/composer.lock') }}
        restore-keys: composer-
    - name: Install Dependencies
      run: |
        composer install --no-interaction --no-progress
    - name: Run Twig CS Fixer
      run: |
        vendor/bin/phpcs -q --report=checkstyle | cs2pr

  TwigCsFixer:
    name: CMS / Check Twig code style
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v6
      - name: Setup PHP, with composer and extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:${{ env.COMPOSER_VERSION }}
          coverage: none
          extensions: gd
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ hashFiles('cms/composer.lock') }}
          restore-keys: composer-
      - name: Install Dependencies
        run: |
          composer install --no-interaction --no-progress
      - name: Run Twig CS Fixer
        run: |
          vendor/bin/twig-cs-fixer lint --report=github

  Phpstan:
    name: CMS / Analyse code using PHPStan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v6
      - name: Setup PHP, with composer and extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: none
          tools: composer:${{ env.COMPOSER_VERSION }}
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ hashFiles('cms/composer.lock') }}
          restore-keys: composer-
      - name: Install composer dependencies
        run: |
          composer install --no-interaction --no-progress
          # Add vendor/bin to PATH for subsequent steps, see https://docs.github.com/en/actions/reference/workflow-commands-for-github-actions#adding-a-system-path
          composer config bin-dir --absolute >> "${GITHUB_PATH}"
      - name: PHPStan analyse
        run: |
          phpstan

  PhpUnit:
    name: CMS / Run PHP unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v6
      - name: Setup PHP, with composer and extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:${{ env.COMPOSER_VERSION }}
          coverage: xdebug
          extensions: gd
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ hashFiles('cms/composer.lock') }}
          restore-keys: composer-
      - name: Install Dependencies
        run: |
          composer install --no-interaction --no-progress
      - name: Run PhpUnit
        run: ./vendor/bin/phpunit --coverage-text

  LightHouse:
    name: CMS / Test site performance using Lighthouse
    needs: [BuildImages]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v6
        with:
          # Our Taskfile requires a proper checkout to function because of
          # certain vars.
          fetch-depth: 0
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull pre-built images
        env:
          TAG: ci-${{ github.sha }}
          REGISTRY: ghcr.io/${{ github.repository_owner }}
        run: |
          for service in cli php nginx varnish node-chrome; do
            docker pull ${REGISTRY}/dpl-cms-${service}:${TAG}
            docker tag ${REGISTRY}/dpl-cms-${service}:${TAG} cms-${service}
          done
      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup site
        run: task ci:reset
        env:
          SKIP_DOCKER_BUILD: "true"
          SKIP_COMPOSER_INSTALL: "true"
      - name: Run Lighthouse test
        run: task ci:lighthouse
      - name: Archive logs
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-results
          path: cms/.lighthouseci

