# These workflows takes care of various CI tests.
on:
  pull_request:
    paths:
      - 'cms/**'
      - '.github/workflows/cms-*.yml'
name: CMS / CI Tests
env:
  PHP_VERSION: 8.3
  COMPOSER_VERSION: v2

# Detect if this action is already running, and cancel it.
# This most likely happened because a second push has been made to a branch.
concurrency:
  group: ${{ github.repository_id }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  PrepareComposerDependencies:
    name: CMS / Prepare Composer dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v6
      - name: Setup PHP, with composer and extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: none
          tools: composer:${{ env.COMPOSER_VERSION }}
          extensions: gd
      - name: Validate composer.json
        run: |
          composer validate --no-check-all --no-check-publish
      - name: Install Composer dependencies
        run: |
          composer install --no-interaction --no-progress
          composer reinstall danskernesdigitalebibliotek/dpl-design-system danskernesdigitalebibliotek/dpl-react --no-cache
          composer drupal:scaffold
          composer -d dev-scripts/dpl-react install --no-interaction --no-progress
      - name: Ensure Composer setup does not modify VCS
        run: git diff --exit-code
      - name: Package Composer project
        run: tar -czf "${{ runner.temp }}/cms-composer-project.tar.gz" .
      - name: Upload Composer project
        uses: actions/upload-artifact@v7
        with:
          name: cms-composer-project
          path: ${{ runner.temp }}/cms-composer-project.tar.gz
          retention-days: 1

  PrepareNodeComposerDependencies:
    name: CMS / Prepare Node Composer dependencies
    needs: [PrepareComposerDependencies]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v6
      - name: Download prepared Composer project
        uses: actions/download-artifact@v7
        with:
          name: cms-composer-project
          path: ${{ runner.temp }}
      - name: Extract prepared Composer project
        run: tar -xzf "${{ runner.temp }}/cms-composer-project.tar.gz" -C .
      - name: Reconfigure git to use HTTP authentication
        run: git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf ssh://git@github.com/
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          cache: 'yarn'
          cache-dependency-path: 'cms/yarn.lock'
      - name: Install Node dependencies
        run: yarn install --frozen-lockfile
      - name: Package Node Composer project
        run: tar -czf "${{ runner.temp }}/cms-node-composer-project.tar.gz" .
      - name: Upload Node Composer project
        uses: actions/upload-artifact@v7
        with:
          name: cms-node-composer-project
          path: ${{ runner.temp }}/cms-node-composer-project.tar.gz
          retention-days: 1

  ValidateComposer:
    name: CMS / Validate Composer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v6
      - name: Setup PHP, with composer and extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: none
          tools: composer:${{ env.COMPOSER_VERSION }}
      - name: Validate composer.json
        run: |
          composer validate --no-check-all --no-check-publish

  Phpcs:
    name: CMS / Check code style
    needs: [PrepareComposerDependencies]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
    - uses: actions/checkout@v6
    - name: Setup PHP, with composer and extensions
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ env.PHP_VERSION }}
        tools: composer:${{ env.COMPOSER_VERSION }}, cs2pr
        coverage: none
        extensions: gd
    - name: Download prepared Composer project
      uses: actions/download-artifact@v7
      with:
        name: cms-composer-project
        path: ${{ runner.temp }}
    - name: Extract prepared Composer project
      run: tar -xzf "${{ runner.temp }}/cms-composer-project.tar.gz" -C .
    - name: Run Twig CS Fixer
      run: |
        vendor/bin/phpcs -q --report=checkstyle | cs2pr

  TwigCsFixer:
    name: CMS / Check Twig code style
    needs: [PrepareComposerDependencies]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v6
      - name: Setup PHP, with composer and extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:${{ env.COMPOSER_VERSION }}
          coverage: none
          extensions: gd
      - name: Download prepared Composer project
        uses: actions/download-artifact@v7
        with:
          name: cms-composer-project
          path: ${{ runner.temp }}
      - name: Extract prepared Composer project
        run: tar -xzf "${{ runner.temp }}/cms-composer-project.tar.gz" -C .
      - name: Run Twig CS Fixer
        run: |
          vendor/bin/twig-cs-fixer lint --report=github

  Phpstan:
    name: CMS / Analyse code using PHPStan
    needs: [PrepareComposerDependencies]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v6
      - name: Setup PHP, with composer and extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: none
          tools: composer:${{ env.COMPOSER_VERSION }}
      - name: Download prepared Composer project
        uses: actions/download-artifact@v7
        with:
          name: cms-composer-project
          path: ${{ runner.temp }}
      - name: Extract prepared Composer project
        run: tar -xzf "${{ runner.temp }}/cms-composer-project.tar.gz" -C .
      - name: Add vendor/bin to PATH
        run: composer config bin-dir --absolute >> "${GITHUB_PATH}"
      - name: PHPStan analyse
        run: |
          phpstan

  PhpUnit:
    name: CMS / Run PHP unit tests
    needs: [PrepareComposerDependencies]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v6
      - name: Setup PHP, with composer and extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:${{ env.COMPOSER_VERSION }}
          coverage: xdebug
          extensions: gd
      - name: Download prepared Composer project
        uses: actions/download-artifact@v7
        with:
          name: cms-composer-project
          path: ${{ runner.temp }}
      - name: Extract prepared Composer project
        run: tar -xzf "${{ runner.temp }}/cms-composer-project.tar.gz" -C .
      - name: Run PhpUnit
        run: ./vendor/bin/phpunit --coverage-text

  LightHouse:
    name: CMS / Test site performance using Lighthouse
    needs: [PrepareNodeComposerDependencies]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v6
        with:
          # Our Taskfile requires a proper checkout to function because of
          # certain vars.
          fetch-depth: 0
      - name: Download prepared Node Composer project
        uses: actions/download-artifact@v7
        with:
          name: cms-node-composer-project
          path: ${{ runner.temp }}
      - name: Extract prepared Node Composer project
        run: tar -xzf "${{ runner.temp }}/cms-node-composer-project.tar.gz" -C .
      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup site
        run: task ci:reset
      - name: Run Lighthouse test
        run: task ci:lighthouse
      - name: Archive logs
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-results
          path: cms/.lighthouseci

  Pa11y:
    name: CMS / Test accessibility using Pa11y
    needs: [PrepareNodeComposerDependencies]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v6
        with:
          # Our Taskfile requires a proper checkout to function because of
          # certain vars.
          fetch-depth: 0
      - name: Download prepared Node Composer project
        uses: actions/download-artifact@v7
        with:
          name: cms-node-composer-project
          path: ${{ runner.temp }}
      - name: Extract prepared Node Composer project
        run: tar -xzf "${{ runner.temp }}/cms-node-composer-project.tar.gz" -C .
      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup site
        run: task ci:reset
      - name: Run Pa11y
        run: task ci:pa11y
      - name: Archive screenshots
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: pa11y-screenshots
          path: cms/pa11y/screenshots

  CypressMapped:
    name: CMS / Run Cypress mapped functional tests
    needs: [PrepareNodeComposerDependencies]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v6
        with:
          # Our Taskfile requires a proper checkout to function because of
          # certain vars.
          fetch-depth: 0
      - name: Download prepared Node Composer project
        uses: actions/download-artifact@v7
        with:
          name: cms-node-composer-project
          path: ${{ runner.temp }}
      - name: Extract prepared Node Composer project
        run: tar -xzf "${{ runner.temp }}/cms-node-composer-project.tar.gz" -C .
      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup site
        run: task ci:reset
      - name: Run Cypress
        run: task ci:cypress:mapped
      - name: Archive videoes
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-mapped-videos
          path: cms/cypress/videos
      - name: Archive screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-mapped-screenshots
          path: cms/cypress/screenshots

  CypressUnmapped:
    name: CMS / Run Cypress unmapped functional tests
    needs: [PrepareNodeComposerDependencies]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v6
        with:
          # Our Taskfile requires a proper checkout to function because of
          # certain vars.
          fetch-depth: 0
      - name: Download prepared Node Composer project
        uses: actions/download-artifact@v7
        with:
          name: cms-node-composer-project
          path: ${{ runner.temp }}
      - name: Extract prepared Node Composer project
        run: tar -xzf "${{ runner.temp }}/cms-node-composer-project.tar.gz" -C .
      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup site
        run: task ci:reset
      - name: Run Cypress
        run: task ci:cypress:unmapped
      - name: Archive videoes
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-unmapped-videos
          path: cms/cypress/videos
      - name: Archive screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-unmapped-screenshots
          path: cms/cypress/screenshots

  CypressWebmaster:
    name: CMS / Run Cypress webmaster functional tests
    needs: [PrepareNodeComposerDependencies]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v6
        with:
          # Our Taskfile requires a proper checkout to function because of
          # certain vars.
          fetch-depth: 0
      - name: Download prepared Node Composer project
        uses: actions/download-artifact@v7
        with:
          name: cms-node-composer-project
          path: ${{ runner.temp }}
      - name: Extract prepared Node Composer project
        run: tar -xzf "${{ runner.temp }}/cms-node-composer-project.tar.gz" -C .
      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup site
        run: task ci:reset
      - name: Run Cypress
        run: task ci:cypress:webmaster
      - name: Archive videoes
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-webmaster-videos
          path: cms/cypress/videos
      - name: Archive screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-webmaster-screenshots
          path: cms/cypress/screenshots

  MarkdownLint:
    name: CMS / Lint Markdown
    needs: [PrepareNodeComposerDependencies]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          cache: 'yarn'
          cache-dependency-path: 'cms/yarn.lock'
      - name: Download prepared Node Composer project
        uses: actions/download-artifact@v7
        with:
          name: cms-node-composer-project
          path: ${{ runner.temp }}
      - name: Extract prepared Node Composer project
        run: tar -xzf "${{ runner.temp }}/cms-node-composer-project.tar.gz" -C .
      - name: Install problem matcher
        uses: xt0rted/markdownlint-problem-matcher@v3
      - name: Lint Markdown
        run: npx markdownlint-cli2

  Shellcheck:
    name: CMS / Shellcheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v6
      - name: shellcheck
        uses: reviewdog/action-shellcheck@v1
        with:
          github_token: ${{ secrets.github_token }}
          fail_on_error: true
          # Use the GitHub PullRequest review comment that reports findings
          # as inlined comments in a PullRequest.
          # Read more about reporters: https://github.com/reviewdog/reviewdog#reporters
          reporter: github-pr-review
          # We can exclude a single directory, so we go for .git.
          path: cms/dev-scripts
          # Set the default filter-mode which only reports violations caused by
          # added/modified lines.
          # Read more about filter-mode: https://github.com/reviewdog/reviewdog#filter-mode
          filter_mode: nofilter

  EslintDrupal:
    name: CMS / Lint Drupal assets
    needs: [PrepareNodeComposerDependencies]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          cache: 'yarn'
          cache-dependency-path: 'cms/yarn.lock'
      - name: Download prepared Node Composer project
        uses: actions/download-artifact@v7
        with:
          name: cms-node-composer-project
          path: ${{ runner.temp }}
      - name: Extract prepared Node Composer project
        run: tar -xzf "${{ runner.temp }}/cms-node-composer-project.tar.gz" -C .
      - name: Run ESLint
        run: npx eslint web -c .eslintrc.json

  EslintCypress:
    name: CMS / Lint Cypress tests
    needs: [PrepareNodeComposerDependencies]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          cache: 'yarn'
          cache-dependency-path: 'cms/yarn.lock'
      - name: Download prepared Node Composer project
        uses: actions/download-artifact@v7
        with:
          name: cms-node-composer-project
          path: ${{ runner.temp }}
      - name: Extract prepared Node Composer project
        run: tar -xzf "${{ runner.temp }}/cms-node-composer-project.tar.gz" -C .
      - name: Run ESLint
        run: npx eslint cypress -c cypress/.eslintrc.json

  CheckOpenApiSpec:
    name: CMS / Check OpenAPI specification
    needs: [PrepareNodeComposerDependencies]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v6
        with:
          # Our Taskfile requires a proper checkout to function because of
          # certain vars.
          fetch-depth: 0
      - name: Download prepared Node Composer project
        uses: actions/download-artifact@v7
        with:
          name: cms-node-composer-project
          path: ${{ runner.temp }}
      - name: Extract prepared Node Composer project
        run: tar -xzf "${{ runner.temp }}/cms-node-composer-project.tar.gz" -C .
      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup site
        run: task ci:reset
      - name: Validate specification
        run: task ci:openapi:validate
      - name: Download current specification
        run: task ci:openapi:download
      - name: Ensure specification has not drifted
        run: git diff --ignore-space-at-eol --exit-code openapi.json
      - name: Generate package for CMS API specification
        run: task dev:codegen:dpl-cms
      - name: Ensure CMS API package code has not drifted
        run: git diff --ignore-space-at-eol --exit-code packages/cms-api/*

  CheckGraphQlSchema:
    name: CMS / Check GraphQL specification
    needs: [PrepareNodeComposerDependencies]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v6
        with:
          # Our Taskfile requires a proper checkout to function because of
          # certain vars.
          fetch-depth: 0
      - name: Download prepared Node Composer project
        uses: actions/download-artifact@v7
        with:
          name: cms-node-composer-project
          path: ${{ runner.temp }}
      - name: Extract prepared Node Composer project
        run: tar -xzf "${{ runner.temp }}/cms-node-composer-project.tar.gz" -C .
      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Enable BNF for site
        run: task dev:bnf:enable
      - name: Setup site
        run: task ci:reset:clean
      - name: Extract GraphQL schema and generate client
        run: task dev:codegen:bnf-graphql
      - name: Ensure GraphQL client code has not drifted
        run: git diff --ignore-space-at-eol --exit-code web/modules/custom/bnf/src/GraphQL/*

  CheckDrupalConfig:
    name: CMS / Check Drupal Config
    needs: [PrepareNodeComposerDependencies]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v6
        with:
          # Our Taskfile requires a proper checkout to function because of
          # certain vars.
          fetch-depth: 0
      - name: Download prepared Node Composer project
        uses: actions/download-artifact@v7
        with:
          name: cms-node-composer-project
          path: ${{ runner.temp }}
      - name: Extract prepared Node Composer project
        run: tar -xzf "${{ runner.temp }}/cms-node-composer-project.tar.gz" -C .
      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup site
        run: task ci:reset
      - name: Export configuration
        run: task dev:cli -- drush config-export -y
      - name: Check for uncommited configuration after install
        run: git diff --ignore-space-at-eol --exit-code config/sync/*.yml

  CheckPhpVersion:
    name: CMS / Check PHP version
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Check PHP version in composer.json
        run: |
          if ! jq .require.php composer.json | grep ${{ env.PHP_VERSION }}; then
            echo "PHP version in composer.json does not match the version in the GitHub Actions."
            exit 1
          fi
      - name: Check PHP version in PHP service
        run: |
          if ! docker compose run php -- php --version | grep ${{ env.PHP_VERSION }}; then
            echo "PHP version for PHP service docker-compose.yml does not match the version in the GitHub Actions."
            exit 1
          fi
      - name: Check PHP version in CLI service
        run: |
          if ! docker compose run php -- php --version | grep ${{ env.PHP_VERSION }}; then
            echo "PHP version for CLI service docker-compose.yml does not match the version in the GitHub Actions."
            exit 1
          fi
