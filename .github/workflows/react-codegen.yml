---
name: React / Codegen

on:
  pull_request:
    paths:
      - 'react/**'
      - 'schemas/openapi/**'
      - 'schemas/graphql/dbc-fbi.temp-next.graphql'
      - 'cms/openapi.json'
      - '.github/workflows/react-codegen.yml'

concurrency:
  group: ${{ github.repository_id }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codegen:
    name: Generated clients
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'react/.nvmrc'
          cache: 'yarn'
          cache-dependency-path: 'react/yarn.lock'
          registry-url: 'https://npm.pkg.github.com'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run codegen
        run: task codegen:all

      - name: Ensure generated client code has not drifted
        run: git diff --exit-code
