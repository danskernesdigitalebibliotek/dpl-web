name: "Service Layer / Type check"

on:
  pull_request:
    paths:
      - 'serviceLayer/**'
      - '.github/workflows/service-layer-*.yml'

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: serviceLayer

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: "serviceLayer/.nvmrc"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run typescript compile check
        run: yarn typecheck
