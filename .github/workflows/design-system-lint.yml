name: Design / Lint

on:
  pull_request:
    paths:
      - 'design-system/**'
      - '.github/workflows/design-system-*.yml'
  push:
    branches:
      - main
    paths:
      - 'design-system/**'
      - '.github/workflows/design-system-*.yml'

jobs:
  css-lint:
    name: Design / CSS Linter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: design-system
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'design-system/.nvmrc'
      - run: npm ci --legacy-peer-deps

      - name: Run css:lint
        run: npm run css:lint

  js-lint:
    name: Design / JS Linter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: design-system
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'design-system/.nvmrc'
      - run: npm ci --legacy-peer-deps

      - name: Run js:lint
        run: npm run js:lint

  markdown-linkt:
    name: Design / Markdown Linter
    if: '!github.event.deleted'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: design-system
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'design-system/.nvmrc'
      - run: npm ci --legacy-peer-deps

      - name: Run markdown:lint
        run: npm run markdown:lint
