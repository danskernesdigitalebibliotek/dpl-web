name: Design / Lint

on:
  pull_request:
    paths:
      - 'design-system/**'
      - '.github/workflows/design-system-*.yml'
  push:
    branches:
      - main
    paths:
      - 'design-system/**'
      - '.github/workflows/design-system-*.yml'

jobs:
  css-lint:
    name: Design / CSS Linter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: design-system
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'design-system/.nvmrc'
      - name: Install dependencies
        # Linters do not require browsers.
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: yarn install --frozen-lockfile

      - name: Run css:lint
        run: yarn css:lint

  js-lint:
    name: Design / JS Linter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: design-system
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'design-system/.nvmrc'
      - name: Install dependencies
        # Linters do not require browsers.
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: yarn install --frozen-lockfile

      - name: Run js:lint
        run: yarn js:lint

  markdown-linkt:
    name: Design / Markdown Linter
    if: '!github.event.deleted'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: design-system
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'design-system/.nvmrc'
      - name: Install dependencies
        # Linters do not require browsers.
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: yarn install --frozen-lockfile

      - name: Run markdown:lint
        run: yarn markdown:lint
