name: React / Create release on tag

on:
  push:
    tags:
      - "*"

jobs:
  create_release:
    name: React / Create release on branch changes
    uses: ./.github/workflows/common-create-release-workflow.yml
    with:
      project: 'react'
      sha: ${{ github.sha }}
      branch: ${{ github.ref_name }}
      dev_release: false
