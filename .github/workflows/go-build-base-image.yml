---
name: Go / Build base image

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_call:

env:
  DOCKER_REGISTRY: ghcr.io
  GH_TOKEN: ${{ secrets.GH_DEPLOYMENT_TOKEN }}
  GO_IMAGE_NAME: '${{ github.repository }}-go'
  LAGOON_DOMAIN: "dplplat02.dpl.reload.dk"
  LAGOON_ENVIRONMENT: "${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || github.ref_name }}"
  OWNER: ${{ github.repository_owner }}
  REPO: ${{ github.event.repository.name }}

jobs:
  BuildGoBaseImage:
    name: Go / Build base image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.GO_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          file: "go/lagoon/base.dockerfile"
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

