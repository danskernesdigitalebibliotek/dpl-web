# Workflow name
name: Go / Accessibility test

# Event for the workflow
on:
  pull_request:
    paths:
      - 'go/**'
      - '.github/workflows/go-*.yml'

# List of jobs
jobs:
  # Run interaction and accessibility tests
  accessibility:
    name: Go / Accessibility tests

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: go

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # 👈 Required to retrieve git history

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: "go/.nvmrc"

      - name: Install dependencies
        # Browsers are installed by the dedicated step below so a CDN stall
        # surfaces with the failing URL instead of hiding in yarn postinstall.
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: yarn

      - name: Load environment variables
        uses: cardinalby/export-env-action@v2
        with:
          envFile: "go/.env.test"

      - name: Install Playwright
        # Experiment: run the install via Playwright 1.54.2 (legacy
        # playwright.azureedge.net CDN) to test whether the broken
        # provisioner only affects the new cdn.playwright.dev/dbazure host.
        # Downstream steps will fail because the project uses 1.56.1; we
        # only care whether this install step completes.
        run: npx -y playwright@1.54.2 install --with-deps
        timeout-minutes: 5

      - name: Build Storybook
        run: yarn build-storybook --quiet

      - name: Serve Storybook and run tests
        run: |
          export FORCE_COLOR=1
          npx concurrently -k -s first -n "SB,TEST" -c "magenta,blue" \
            "npx http-server storybook-static --port 6006 --silent" \
            "npx wait-on tcp:6006 && yarn test-storybook"
