# Workflow name
name: Go / Accessibility test

# Event for the workflow
on:
  pull_request:
    paths:
      - 'go/**'
      - '.github/workflows/go-*.yml'

# List of jobs
jobs:
  # Run interaction and accessibility tests
  accessibility:
    name: Go / Accessibility tests

    # Experiment: ubuntu-24.04 image (provisioner 20260520.533+) wedges
    # `playwright install` after the first browser download. Pin to the
    # older 22.04 family to verify the regression is image specific.
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: go

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # 👈 Required to retrieve git history

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: "go/.nvmrc"

      - name: Install dependencies
        run: yarn

      - name: Load environment variables
        uses: cardinalby/export-env-action@v2
        with:
          envFile: "go/.env.test"

      - name: Install Playwright
        run: npx playwright install --with-deps
        timeout-minutes: 5

      - name: Build Storybook
        run: yarn build-storybook --quiet

      - name: Serve Storybook and run tests
        run: |
          export FORCE_COLOR=1
          npx concurrently -k -s first -n "SB,TEST" -c "magenta,blue" \
            "npx http-server storybook-static --port 6006 --silent" \
            "npx wait-on tcp:6006 && yarn test-storybook"
