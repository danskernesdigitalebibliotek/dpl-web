# Workflow name
name: Go / Accessibility test

# Event for the workflow
on:
  pull_request:
    paths:
      - 'go/**'
      - '.github/workflows/go-*.yml'

# List of jobs
jobs:
  # Run interaction and accessibility tests
  accessibility:
    name: Go / Accessibility tests

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: go

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # 👈 Required to retrieve git history

      - uses: ./.github/actions/common-setup-js
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Load environment variables
        uses: cardinalby/export-env-action@v2
        with:
          envFile: "go/.env.test"

      - name: Install Playwright
        run: pnpm dlx playwright install --with-deps
        timeout-minutes: 5

      - name: Build Storybook
        run: pnpm run build-storybook --quiet

      - name: Serve Storybook and run tests
        run: |
          export FORCE_COLOR=1
          pnpm dlx concurrently -k -s first -n "SB,TEST" -c "magenta,blue" \
            "pnpm dlx http-server storybook-static --port 6006 --silent" \
            "pnpm dlx wait-on tcp:6006 && pnpm run test-storybook"
