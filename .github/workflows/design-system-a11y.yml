name: Design / Accessibility

on:
  pull_request:
    paths:
      - 'design-system/**'
      - '.github/workflows/design-system-*.yml'
  push:
    branches:
      - main
    paths:
      - 'design-system/**'
      - '.github/workflows/design-system-*.yml'

jobs:
  a11y:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: design-system
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/common-setup-js
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Design / Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium
        timeout-minutes: 5

      - name: Design / Compile styles
        run: pnpm run css:build

      - name: Design / Run accessibility tests
        run: pnpm run storybook:axe
