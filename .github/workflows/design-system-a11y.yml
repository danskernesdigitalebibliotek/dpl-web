name: Design / Accessibility

on:
  pull_request:
    paths:
      - 'design-system/**'
      - '.github/workflows/design-system-*.yml'
  push:
    branches:
      - main
    paths:
      - 'design-system/**'
      - '.github/workflows/design-system-*.yml'

jobs:
  a11y:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: design-system
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'design-system/.nvmrc'
      - name: Install dependencies
        # Browsers are installed by the dedicated step below so a CDN stall
        # surfaces with the failing URL instead of hiding in yarn postinstall.
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: yarn install --frozen-lockfile

      - name: Design / Install Playwright Browsers
        # Experiment: run the install via Playwright 1.54.2 (legacy
        # playwright.azureedge.net CDN) to test whether the broken
        # provisioner only affects the new cdn.playwright.dev/dbazure host.
        # Downstream steps will fail because the project uses 1.56.1; we
        # only care whether this install step completes.
        run: npx -y playwright@1.54.2 install --with-deps
        timeout-minutes: 5

      - name: Design / Compile styles
        run: yarn css:build

      - name: Design / Run accessibility tests
        run: yarn storybook:axe
