name: Design / Accessibility

on:
  pull_request:
    paths:
      - 'design-system/**'
      - '.github/workflows/design-system-*.yml'
  push:
    branches:
      - main
    paths:
      - 'design-system/**'
      - '.github/workflows/design-system-*.yml'

jobs:
  a11y:
    # Experiment: ubuntu-24.04 image (provisioner 20260520.533+) wedges
    # `playwright install` after the first browser download. Pin to the
    # older 22.04 family to verify the regression is image specific.
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: design-system
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'design-system/.nvmrc'
      - run: yarn install --frozen-lockfile

      - name: Design / Install Playwright Browsers
        run: yarn playwright install --with-deps
        timeout-minutes: 5

      - name: Design / Compile styles
        run: yarn css:build

      - name: Design / Run accessibility tests
        run: yarn storybook:axe
