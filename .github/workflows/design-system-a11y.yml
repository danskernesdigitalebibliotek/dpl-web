name: Design / Accessibility

on:
  pull_request:
    paths:
      - 'design-system/**'
      - '.github/workflows/design-system-*.yml'
  push:
    branches:
      - main
    paths:
      - 'design-system/**'
      - '.github/workflows/design-system-*.yml'

jobs:
  a11y:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: design-system
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'design-system/.nvmrc'
      - name: Install dependencies
        # Browsers are installed by the dedicated step below so a CDN stall
        # surfaces with the failing URL instead of hiding in yarn postinstall.
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: yarn install --frozen-lockfile

      - name: Design / Install Playwright Browsers
        run: yarn playwright install --with-deps
        timeout-minutes: 5

      - name: Design / Compile styles
        run: yarn css:build

      - name: Design / Run accessibility tests
        run: yarn storybook:axe
