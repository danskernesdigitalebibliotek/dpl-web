---
name: Check failing actions (workflow_run)

on:
  workflow_run:
    workflows: ['*']
    types:
      - completed

jobs:
  report-failure:
    name: Report failed workflow
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      (github.event.workflow_run.head_branch == 'develop' ||
       github.event.workflow_run.head_branch == 'main') &&
      github.event.workflow_run.name != 'Check failing actions (workflow_run)'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Summarise failed run
        run: |
          {
            echo "## Failed workflow detected"
            echo ""
            echo "- **Workflow:** ${{ github.event.workflow_run.name }}"
            echo "- **Branch:** ${{ github.event.workflow_run.head_branch }}"
            echo "- **Commit:** ${{ github.event.workflow_run.head_sha }}"
            echo "- **Run:** [${{ github.event.workflow_run.id }}](${{ github.event.workflow_run.html_url }})"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Zulip
        env:
          ZULIP_WEBHOOK_URL: ${{ secrets.ZULIP_WEBHOOK_URL }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          COMMIT: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          content=$(printf '**Workflow failed on %s**\n\n- Workflow: %s\n- Commit: %s%s%s\n- [View run](%s)' \
            "$BRANCH" "$WORKFLOW_NAME" '`' "$COMMIT" '`' "$RUN_URL")
          jq -n --arg text "$content" '{text: $text}' \
            | curl -sS -X POST -H 'Content-Type: application/json' \
                --data-binary @- "${ZULIP_WEBHOOK_URL}&topic=Fejlede%20actions%20(workflow_run)"

      - name: Fail the job
        run: |
          echo "::error::Workflow '${{ github.event.workflow_run.name }}' failed on ${{ github.event.workflow_run.head_branch }}"
          exit 1
