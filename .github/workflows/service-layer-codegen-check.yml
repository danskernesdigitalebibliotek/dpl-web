name: "Service Layer / Codegen check"

on:
  pull_request:
    paths:
      - 'packages/js/service-layer/**'
      - '.github/workflows/service-layer-*.yml'

jobs:
  codegen:
    name: Codegen up to date
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/js/service-layer

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: "packages/js/service-layer/.nvmrc"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Re-run FBS codegen
        run: yarn codegen:fbs

      - name: Verify generated files match the spec
        run: |
          if ! git diff --exit-code -- fbs/src/generated; then
            echo "::error::Generated FBS files are out of date with fbs-adapter.yaml. Run 'yarn codegen:fbs' inside packages/js/service-layer and commit the result."
            exit 1
          fi
