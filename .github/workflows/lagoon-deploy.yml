on:
  pull_request:
    types: [ opened, synchronize, reopened, closed, edited ]
    paths:
      - 'cms/**'
      - 'go/**'
      - '.lagoon.yml'
      - 'docker-compose.lagoon.yml'
      - '.github/workflows/cms-*.yml'
  push:
    branches:
      - develop
      - main
      - go-demo
      - go-playground
      - app-playground
    paths:
      - 'cms/**'
      - 'go/**'
      - '.lagoon.yml'
      - 'docker-compose.lagoon.yml'
      - '.github/workflows/cms-*.yml'
name: Lagoon / Deploy application

env:
  LAGOON_DOMAIN: "dplplat02.dpl.reload.dk"
  LAGOON_ENVIRONMENT: "${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || github.ref_name }}"
  GH_TOKEN: ${{ secrets.GH_DEPLOYMENT_TOKEN }}
  OWNER: ${{ github.repository_owner }}
  REPO: ${{ github.event.repository.name }}
jobs:
  BranchNameLength:
    name: Lagoon / Check branch name length
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name length
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          if [ "${#BRANCH_NAME}" -gt 100 ]; then
            echo "Branch name too long. This cannot be deployed to Lagoon."
            exit 1
          fi

  BuildGoBaseImage:
    name: Go / Build Go base image
    needs: [BranchNameLength]
    # Narrow the main workflow conditions to only run when a PR is opened or updated, or when a push is made to the special branches.
    if: ${{ (github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'reopened' || github.event.action == 'synchronize')) || (github.event_name == 'push' && (github.ref_name == 'develop' || github.ref_name == 'main' || github.ref_name == 'go-demo' || github.ref_name == 'go-playground' || github.ref_name == 'app-playground')) }}
    uses: ./.github/workflows/go-build-base-image.yml

  # Creating the deployment that Lagoon will look for, and add status to.
  CreateDeployment:
    name: Lagoon / Create deployment
    runs-on: ubuntu-latest
    needs: [BuildGoBaseImage]
    steps:
      - env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          LAGOON_DEPLOYS_LOG_URL="https://ui.lagoon.${{ env.LAGOON_DOMAIN }}/projects/dpl-web/dpl-web-${{ env.LAGOON_ENVIRONMENT }}/deployments"

          DEPLOYMENT_ID="$(
            jq -nc \
              --arg ref "$BRANCH_NAME" \
              --arg environment "${{ env.LAGOON_ENVIRONMENT }}" \
              '{ref: $ref, environment: $environment, auto_merge: false, required_contexts: []}' \
            | gh api --method POST "/repos/${{ env.OWNER }}/${{ env.REPO }}/deployments" --input - --jq '.id'
          )"

          gh api --method POST "/repos/${{ env.OWNER }}/${{ env.REPO }}/deployments/$DEPLOYMENT_ID/statuses" \
            -f "state=in_progress" -f "log_url=$LAGOON_DEPLOYS_LOG_URL"

          echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"

  CreateDeploymentBNF:
    name: Lagoon / Create BNF deployment
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && startsWith(github.event.pull_request.title, 'bnf:') && (github.event.action == 'opened' || github.event.action == 'reopened' || github.event.action == 'synchronize') }}
    needs: [BuildGoBaseImage]
    steps:
      - env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          LAGOON_DEPLOYS_LOG_URL="https://ui.lagoon.${{ env.LAGOON_DOMAIN }}/projects/dpl-web-bnf/dpl-web-bnf-${{ env.LAGOON_ENVIRONMENT }}/deployments"

          DEPLOYMENT_ID="$(
            jq -nc \
              --arg ref "$BRANCH_NAME" \
              --arg environment "${{ env.LAGOON_ENVIRONMENT }}-bnf" \
              '{ref: $ref, environment: $environment, auto_merge: false, required_contexts: []}' \
            | gh api --method POST "/repos/${{ env.OWNER }}/${{ env.REPO }}/deployments" --input - --jq '.id'
          )"

          gh api --method POST "/repos/${{ env.OWNER }}/${{ env.REPO }}/deployments/$DEPLOYMENT_ID/statuses" \
            -f "state=in_progress" -f "log_url=$LAGOON_DEPLOYS_LOG_URL"

          echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"

  # When we close the pull request, we want to delete the associated environment.
  CloseEnvironment:
    name: Lagoon / Delete environment
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' }}
    needs: [BranchNameLength]
    steps:
      - run: gh api --method DELETE "/repos/${{ env.OWNER }}/${{ env.REPO }}/environments/${{ env.LAGOON_ENVIRONMENT }}"

  # We only permit the integration with Lagoon to run if the user is
  # authorized. This saves on resources and ensures we only spin up sites for
  # legitimate contributions.
  # The integration is controlled by creating synthetic events related to select
  # pull-request events, and send them to Lagoon.
  # Deploys must wait for the Go base image to be pushed, or Lagoon's build
  # pulls an image that does not exist yet. Skipped on close (nothing to build).
  InformLagoonDeploy:
    name: Lagoon / Send deploy event to Lagoon
    runs-on: ubuntu-latest
    needs: [BuildGoBaseImage]
    steps:
      - name: Send pull request event
        uses: distributhor/workflow-webhook@v3
        env:
          webhook_url: ${{ secrets.LAGOON_WEBHOOK_URL }}
          webhook_secret: ${{ secrets.LAGOON_WEBHOOK_SECRET }}
          webhook_type: 'json-extended'

  # Closing a PR has no build to wait for, so inform Lagoon directly to tear
  # down the environment.
  InformLagoonClose:
    name: Lagoon / Send close event to Lagoon
    runs-on: ubuntu-latest
    needs: [BranchNameLength]
    if: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' }}
    steps:
      - name: Send pull request event
        uses: distributhor/workflow-webhook@v3
        env:
          webhook_url: ${{ secrets.LAGOON_WEBHOOK_URL }}
          webhook_secret: ${{ secrets.LAGOON_WEBHOOK_SECRET }}
          webhook_type: 'json-extended'
