---
name: Release Creation
on:
  workflow_call:
    inputs:
      # "design-system" / "react"
      project:
        required: true
        type: string

      # ${{ github.sha }}
      sha:
        required: true
        type: string

      # ${{ github.ref_name }}
      branch:
        required: true
        type: string

      dev_release:
        type: boolean

    outputs:
      tag_name:
        description: "The release tag name"
        value: ${{ jobs.build-release.outputs.tag_name }}
      dist_filename:
        description: "The release dist filename"
        value: ${{ jobs.build-release.outputs.dist_filename }}

jobs:
  build-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.project }}
    outputs:
      tag_name: ${{ steps.build-variables.outputs.tag_name }}
      dist_filename: ${{ steps.build-variables.outputs.dist_filename }}
    steps:
      - name: Build Variables
        id: build-variables
        working-directory: .
        # Version 0.0.0-SHA is a schema that supports semantic versioning but
        # should sink below proper versions.
        # Output package.json to provide insight and help debugging
        # Using branch names as tags allows other projects to track unreleased
        # development.
        run: |
          TAG_NAME=$(echo branch-${{ inputs.branch }} | sed -E -e 's/[^[:alnum:]]+/-/g' -e 's/^-+|-+$//g' | tr '[:upper:]' '[:lower:]')
          DIST_FILENAME="dist-${{ inputs.project }}.zip"
          {
            echo "TAG_NAME=$TAG_NAME"
            echo "BUILD_VERSION=${{ inputs.branch }}-${{ inputs.sha }}"
            echo "DIST_FILENAME=$DIST_FILENAME"
            echo "NPM_VERSION=0.0.0-${{ inputs.sha }}"
          } >> "$GITHUB_ENV"
          {
            echo "tag_name=$TAG_NAME"
            echo "dist_filename=$DIST_FILENAME"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '${{ inputs.project }}/.nvmrc'
          cache: 'npm'
          cache-dependency-path: '${{ inputs.project }}/package-lock.json'
          registry-url: 'https://npm.pkg.github.com'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bundling assets
        run: ./bundle.sh
        env:
          VERSION: ${{ env.TAG_NAME }}-${{ inputs.sha }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-dist-${{inputs.project}}
          path: "${{inputs.project}}/dist.zip"

  upsert-prerelease:
    runs-on: ubuntu-latest
    needs: build-release
    if: ${{ inputs.dev_release }}
    concurrency:
      # Serialize release API writes per ref to avoid cross-workflow races.
      group: release-write-${{ github.repository }}-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Download release artifact
        uses: actions/download-artifact@v7
        with:
          name: release-dist-${{inputs.project}}

      - name: Rename assets
        run: |
          mv dist.zip ${{ needs.build-release.outputs.dist_filename }}

      - name: Create or update tag
        uses: EndBug/latest-tag@v1.6.3
        with:
          ref: ${{ needs.build-release.outputs.tag_name }}

      - name: Create or update pre-release (no delete, assets replaced in place)
        id: upsert-release
        run: |
          TAG_NAME="${{ needs.build-release.outputs.tag_name }}"
          CURRENT_SHA="${{ inputs.sha }}"
          DIST_FILE="${{ needs.build-release.outputs.dist_filename }}"

          if RELEASE_INFO=$(gh release view "$TAG_NAME" --json url 2>/dev/null); then
            RELEASE_URL=$(echo "$RELEASE_INFO" | jq -r '.url')

            echo "Release exists for $TAG_NAME, updating in place (no downtime)."
            # Tag already points to CURRENT_SHA (updated by Create or update tag step). Only replace assets.
            gh release upload "$TAG_NAME" "$DIST_FILE" --clobber
            echo "url=$RELEASE_URL" >> "$GITHUB_OUTPUT"
          else
            echo "No existing release for $TAG_NAME, creating."
            gh release create "$TAG_NAME" \
              --prerelease \
              --target "$CURRENT_SHA" \
              --notes "Triggered by branch change."
            RELEASE_URL=$(gh release view "$TAG_NAME" --json url -q '.url')
            gh release upload "$TAG_NAME" "$DIST_FILE" --clobber
            echo "url=$RELEASE_URL" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Adding summary
        run: |
          echo "🛠️ Dev-release created at: ${{ steps.upsert-release.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"

  create-release:
    runs-on: ubuntu-latest
    needs: build-release
    if: ${{ !inputs.dev_release }}
    concurrency:
      # Serialize release API writes per ref to avoid cross-workflow races.
      group: release-write-${{ github.repository }}-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Download release artifact
        uses: actions/download-artifact@v7
        with:
          name: release-dist-${{inputs.project}}

      - name: Rename assets
        run: |
          mv dist.zip "${{ needs.build-release.outputs.dist_filename }}"

      - name: Create Release
        id: create-release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: ${{ needs.build-release.outputs.dist_filename }}

      - name: Adding summary
        run: |
          echo "🚀 Tag-release created: ${{ steps.create-release.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
