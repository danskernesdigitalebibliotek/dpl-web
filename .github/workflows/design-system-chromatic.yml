name: Design / Chromatic

on:
  push:
    branches:
      # Required for creating baselines
      - main
      - develop
      - release/*
    paths:
      - 'design-system/**'
      - '.github/workflows/design-system-*.yml'
  pull_request:
    paths:
      - 'design-system/**'
      - '.github/workflows/design-system-*.yml'
    types: [ready_for_review, opened, synchronize]

# Detect if this action is already running, and cancel it.
# This most likely happened because a second push has been made to a branch.
concurrency:
  group: ${{ github.repository_id }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic-deployment:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: design-system
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: 'design-system/.nvmrc'

      - run: yarn install --frozen-lockfile

      - name: Publish to Chromatic
        uses: chromaui/action@v16
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN_DESIGN_SYSTEM }}
          workingDir: design-system
          onlyChanged: true
          untraced: "design-system/package.json,design-system/yarn.lock"
