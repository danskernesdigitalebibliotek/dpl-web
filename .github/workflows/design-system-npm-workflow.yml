---
name: Design / Create and Release NPM package

on:
  workflow_call:
    inputs:
      latest:
        required: true
        type: boolean
      tag_name:
        required: true
        type: string
      npm_version:
        required: true
        type: string

jobs:
  create_npm_package:
    name: Design / Create and Release NPM package
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: design-system

    env:
      NPM_VERSION: ${{ inputs.npm_version }}
      TAG_NAME: ${{ inputs.tag_name }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: 'design-system/.nvmrc'
          cache: 'yarn'
          cache-dependency-path: 'design-system/yarn.lock'
          registry-url: 'https://npm.pkg.github.com'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create NPMRC
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "[@${{ github.repository_owner }}]:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
          echo 'registry "https://registry.yarnpkg.com"' >> ~/.yarnrc

      - name: Build package files for npm publish
        run: |
          bash ./bundle.sh
          npm pack --dry-run

      - name: Set package metadata for current repository owner
        run: |
          PACKAGE_NAME=$(npm pkg get name | tr -d '"')
          PACKAGE_BASENAME="${PACKAGE_NAME##*/}"
          PACKAGE_OWNER=$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')

          npm pkg set "name=@${PACKAGE_OWNER}/${PACKAGE_BASENAME}"
          npm pkg set "repository=https://github.com/$GITHUB_REPOSITORY"

      - name: Delete any existing package version (non-latest)
        if: ${{ !inputs.latest }}
        run: |
          PACKAGE_NAME=$(npm pkg get name | tr -d '"')
          PACKAGE_NAME_ENCODED=$(jq -rn --arg value "$PACKAGE_NAME" '$value|@uri')
          PACKAGE_BASENAME="${PACKAGE_NAME##*/}"

          declare -a PACKAGE_IDENTIFIERS=("$PACKAGE_NAME_ENCODED" "$PACKAGE_BASENAME")
          declare -a OWNER_PREFIXES=("/orgs/${GITHUB_REPOSITORY_OWNER}" "/users/${GITHUB_REPOSITORY_OWNER}")

          FOUND_ENDPOINT=""
          for OWNER_PREFIX in "${OWNER_PREFIXES[@]}"; do
            for PACKAGE_IDENTIFIER in "${PACKAGE_IDENTIFIERS[@]}"; do
              VERSIONS_ENDPOINT="${OWNER_PREFIX}/packages/npm/${PACKAGE_IDENTIFIER}/versions?per_page=100"
              if gh api "$VERSIONS_ENDPOINT" > package_versions.json; then
                FOUND_ENDPOINT="${OWNER_PREFIX}/packages/npm/${PACKAGE_IDENTIFIER}/versions"
                break 2
              fi
            done
          done

          if [ -z "$FOUND_ENDPOINT" ]; then
            echo "Could not read package versions for ${PACKAGE_NAME} (scoped or unscoped API path)."
            exit 1
          fi

          VERSION_ID=$(jq -r --arg version "$NPM_VERSION" 'map(select(.name == $version)) | first | .id // empty' package_versions.json)

          if [ -z "$VERSION_ID" ]; then
            echo "No existing ${PACKAGE_NAME}@${NPM_VERSION}, continuing."
            exit 0
          fi

          echo "Deleting existing ${PACKAGE_NAME}@${NPM_VERSION} (id: ${VERSION_ID})."
          gh api -X DELETE "${FOUND_ENDPOINT}/${VERSION_ID}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release NPM package (non-latest)
        if: ${{ !inputs.latest }}
        run: |
          npm version ${{ env.NPM_VERSION }} --no-git-tag-version
          echo ${{ env.TAG_NAME }}
          cat package.json
          npm publish --tag ${{ env.TAG_NAME }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release NPM package (latest)
        if: ${{ inputs.latest }}
        run: |
          npm version ${{ env.NPM_VERSION }} --no-git-tag-version
          cat package.json
          npm publish --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Adding summary
        run: |
          echo "Npm package created 🚀. Version: ${{ env.NPM_VERSION }}" >> $GITHUB_STEP_SUMMARY
