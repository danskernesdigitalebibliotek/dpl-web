name: React / Create release on branch changes

on:
  push:
    branches-ignore:
      # Dependabot does not have permissions to create releases
      - 'dependabot/**'

jobs:
  create_release:
    name: React / Create release on branch changes
    uses: ./.github/workflows/common-create-release-workflow.yml
    with:
      project: 'react'
      sha: ${{ github.sha }}
      branch: ${{ github.ref_name }}
      dev_release: true
