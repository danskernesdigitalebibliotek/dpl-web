# Build and publish a PR-tagged dpl-go-node image.
# After the image is published, manually re-deploy in the Lagoon UI
# so the PR environment picks up the new image.
name: Go / Publish PR source
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'go/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write

    defaults:
      run:
        working-directory: go

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false

      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: "go/.nvmrc"
          cache: "yarn"
          cache-dependency-path: "go/yarn.lock"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .version file
        run: |
          echo "{\"version\": \"pr-${{ github.event.pull_request.number }}\"}" > .version

      - name: Build and publish source
        run: |
          RELEASE_IMAGE_TAG=pr-${{ github.event.pull_request.number }} \
          RELEASE_IMAGE_REGISTRY=ghcr.io/${{ github.repository_owner }} \
          task source:deploy
        env:
          CR_PAT: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const image = `ghcr.io/${{ github.repository_owner }}/dpl-go-node:pr-${{ github.event.pull_request.number }}`;
            const lagoonUrl = `https://ui.lagoon.dplplat02.dpl.reload.dk/projects/dpl-web/dpl-web-pr-${{ github.event.pull_request.number }}/deployments`;
            const body = [
              `**Go source image ready** \`${image}\``,
              ``,
              `Re-deploy in Lagoon to pick up the new image:`,
              `${lagoonUrl}`,
            ].join('\n');

            // Update existing comment if one exists, otherwise create new.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.pull_request.number }},
            });
            const existing = comments.find(c => c.body.includes('Go source image ready'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ github.event.pull_request.number }},
                body,
              });
            }
