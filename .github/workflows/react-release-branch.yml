---
name: React / Branch Release

on:
  push:
    branches-ignore:
      # Dependabot does not have permissions to create releases
      - 'dependabot/**'

concurrency:
  # Serialize branch-release writes shared with design branch workflow.
  group: branch-release-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  create_release:
    name: React / Create release on branch changes
    uses: ./.github/workflows/common-release-workflow.yml
    with:
      project: 'react'
      sha: ${{ github.sha }}
      branch: ${{ github.ref_name }}
      dev_release: true
