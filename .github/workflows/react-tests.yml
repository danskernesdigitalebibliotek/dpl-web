name: React / Integration test

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'react/**'
      - '.github/workflows/react-*.yml'
  pull_request:
    paths:
      - 'react/**'
      - '.github/workflows/react-*.yml'

jobs:
  integration:
    name: React / Integration test
    if: '!github.event.deleted'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react
    env:
      TZ: Europe/Copenhagen
    strategy:
      # When one test fails, DO NOT cancel the other containers, because this
      # will kill Cypress processes leaving Cypress Cloud hanging.
      # https://github.com/cypress-io/github-action/issues/48
      fail-fast: false
      matrix:
        # Run 3 copies of the current job in parallel
        containers: [1, 2, 3]
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: 'react/.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'react/package-lock.json'
          registry-url: 'https://npm.pkg.github.com'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Cypress run
        uses: cypress-io/github-action@v7
        with:
          install: false
          start: npm run start:storybook:test
          wait-on: 'http://localhost:57021'
          browser: ${{ steps.setup-chrome.outputs.chrome-path }}
          group: 'Integration tests'
          parallel: true
          working-directory: react
          record: true
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          CYPRESS_PROJECT_ID: ${{ secrets.CYPRESS_PROJECT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload screenshots
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: cypress-screenshots-${{ matrix.containers }}
          path: react/cypress/screenshots
      - name: Upload videos
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: cypress-videos-${{ matrix.containers }}
          path: react/cypress/videos
      - run: mkdir -p .nyc_output
      - name: Generate code coverage report
        run: npm run nyc report --reporter=clover --reporter=text --report-dir=./coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: react/coverage/
          flags: integration
          fail_ci_if_error: false

  unit:
    name: React / Unit test
    if: '!github.event.deleted'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: 'react/.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'react/package-lock.json'
          registry-url: 'https://npm.pkg.github.com'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Run unit tests
        run: npm run test:unit

