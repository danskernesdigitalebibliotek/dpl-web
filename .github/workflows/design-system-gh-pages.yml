name: Design / GitHub Pages

on:
  push:
    branches:
      - develop
    paths:
      - 'design-system/**'
      - '.github/workflows/design-system-*.yml'

jobs:
  github-pages:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: design-system
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: 'design-system/.nvmrc'

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - run: npm ci --legacy-peer-deps
      - run: npm run css:build
      - run: npm run build-storybook

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./design-system/storybook-static
          destination_dir: design-system
          # Don't wipe out other projects folder when deploying this.
          keep_files: true
