# Unified Dependabot configuration for DPL Web monorepo
# This configuration manages dependency updates for all four projects:
# - cms (Drupal CMS with Composer and npm)
# - design-system (React/Storybook with npm)
# - go (Next.js with npm)
# - react (React components with npm)
version: 2
updates:
  # GitHub Actions - applies to all workflows in .github/workflows
  - package-ecosystem: github-actions
    directory: "/"
    open-pull-requests-limit: 20
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Europe/Copenhagen
    labels:
      - "dependencies"
      - "github_actions"

  # CMS - Composer dependencies
  - package-ecosystem: composer
    directory: "/cms"
    open-pull-requests-limit: 20
    groups:
      drupal-core-minor-releases:
        patterns:
          - "drupal/core"
          - "drupal/core*"
        update-types:
          - "minor"
      drupal-core-patch-releases:
        patterns:
          - "drupal/core"
          - "drupal/core*"
        update-types:
          - "patch"
    ignore:
      # Never attempt automated updates to major Drupal releases.
      - dependency-name: "drupal/core*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "drupal/potion"
      - dependency-name: "spawnia/sailor"
        versions: [">1.1.0"]
      # drupal/next 2.1.0 adds draft_enabled to exported Next entity config.
      - dependency-name: "drupal/next"
        versions: [">=2.1.0"]
      # Our patches are not compatible with the latest version.
      - dependency-name: "drupal/entity_reference_revisions"
        versions: [">=1.13.0"]
      # Automated updates to paragraphs also trigger updates to
      # entity_reference_revisions.
      - dependency-name: "drupal/paragraphs"
        versions: [">1.19.0"]
      # Drupal 10.6.x breaks the CMS opening-hours Cypress flow.
      - dependency-name: "drupal/core*"
        versions: [">=10.6.0"]
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Europe/Copenhagen
    labels:
      - "dependencies"
      - "cms"
      - "drupal"

  # CMS dev-scripts - Composer dependencies
  - package-ecosystem: composer
    directory: "/cms/dev-scripts"
    open-pull-requests-limit: 20
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Europe/Copenhagen
    labels:
      - "dependencies"
      - "cms"
      - "dev-scripts"

  # CMS - npm dependencies
  - package-ecosystem: npm
    directory: "/cms"
    open-pull-requests-limit: 20
    groups:
      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
    ignore:
      # @types/node are linked to the Node version used within the project.
      # Bump the package manually when upgrading to a new Node version.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "cypress"
        update-types: ["version-update:semver-major"]
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Europe/Copenhagen
    labels:
      - "dependencies"
      - "cms"
      - "js-dependencies"

  # Design System - npm dependencies
  - package-ecosystem: npm
    directory: "/design-system"
    open-pull-requests-limit: 20
    versioning-strategy: increase
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Europe/Copenhagen
    labels:
      - "dependencies"
      - "design-system"
    groups:
      react:
        patterns:
          - "react"
          - "@types/react"
          - "react-dom"
          - "@types/react-dom"
      storybook:
        patterns:
          - "storybook"
          - "@storybook/*"
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        versions: [">=18"]
      - dependency-name: "@types/react"
        versions: [">=18"]
      - dependency-name: "react-dom"
        versions: [">=18"]
      - dependency-name: "@types/react-dom"
        versions: [">=18"]
      - dependency-name: "stylelint-config-recommended-scss"
        versions: [">=16"]
      - dependency-name: "storybook"
        versions: [">=10"]
      - dependency-name: "@storybook/*"
        versions: [">=10"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Go (Next.js) - npm dependencies
  - package-ecosystem: npm
    directory: "/go"
    open-pull-requests-limit: 20
    versioning-strategy: increase
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Europe/Copenhagen
    labels:
      - "dependencies"
      - "go"
    groups:
      radix-ui:
        patterns:
          - "@radix-ui/*"
      graphql-codegen:
        patterns:
          - "@graphql-codegen/*"
      typescript:
        patterns:
          - "typescript"
          - "tsx"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      next:
        patterns:
          - "next"
          - "@next/env"
          - "eslint-config-next"
          - "@next/eslint-plugin-next"
      tailwindcss:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "tailwindcss-animate"
      prettier:
        patterns:
          - "prettier"
          - "eslint-config-prettier"
      cva:
        patterns:
          - "class-variance-authority"
          - "clsx"
      storybook:
        patterns:
          - "storybook"
          - "@storybook/*"
          - "eslint-plugin-storybook"
      xstate:
        patterns:
          - "xstate"
          - "@xstate/*"
      react-query:
        patterns:
          - "@tanstack/react-query"
          - "@tanstack/react-query-devtools"
      jwt-simple:
        patterns:
          - "jwt-simple"
          - "@types/jwt-simple"
      eslint:
        patterns:
          - "eslint"
          - "@eslint/js"
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # @vitejs/plugin-react 6 expects a newer Vite major than the current Go frontend uses.
      - dependency-name: "@vitejs/plugin-react"
        versions: [">=6.0.0"]
      # The Go lint stack still depends on packages that only support ESLint 8/9.
      - dependency-name: "eslint"
        versions: [">=10.0.0"]
      - dependency-name: "cypress"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@graphql-codegen/typescript-react-query"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # React - npm dependencies
  - package-ecosystem: npm
    directory: "/react"
    open-pull-requests-limit: 20
    versioning-strategy: increase
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Europe/Copenhagen
    labels:
      - "dependencies"
      - "react"
    groups:
      babel:
        patterns:
          - "@babel/*"
      fullcalendar:
        patterns:
          - "@fullcalendar/*"
      graphql-codegen:
        patterns:
          - "@graphql-codegen/*"
          - "@graphql-typed-document-node/core"
          - "replace-in-file"
          - "typescript-graphql-typed-files-modules"
      react:
        patterns:
          - "react"
          - "@types/react"
          - "react-dom"
          - "@types/react-dom"
      redux:
        patterns:
          - "@reduxjs/toolkit"
          - "@types/react-redux"
          - "react-redux"
          - "redux"
          - "redux-persist"
      storybook:
        patterns:
          - "storybook"
          - "@storybook/*"
      testing-library:
        patterns:
          - "@testing-library/*"
      cypress:
        patterns:
          - "cypress"
          - "@cypress/*"
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "storybook"
        versions: [">=9"]
      - dependency-name: "@storybook/react"
        versions: [">=9.0.0"]
      - dependency-name: "@storybook/react-webpack5"
        versions: [">=9"]
      - dependency-name: "@storybook/addon-queryparams"
        versions: [">=9.0.0"]
      - dependency-name: "@chromatic-com/storybook"
        versions: [">=4"]
      # The current React Cypress stack is not compatible with Cypress 14.4+ or code-coverage 4.
      - dependency-name: "cypress"
        versions: [">=14.4.0"]
      - dependency-name: "@cypress/code-coverage"
        versions: [">=4.0.0"]
      - dependency-name: "dotenv"
        update-types: ["version-update:semver-major"]
      # Vitest 3 changes unit-test asset rendering and timer behavior in the React snapshot suite.
      - dependency-name: "vitest"
        versions: [">=3.0.0"]
      # The current React lint stack still depends on plugins that are not ESLint 10 compatible.
      - dependency-name: "eslint"
        versions: [">=10.0.0"]
      # eslint-plugin-cypress v6 uses a flat-config shape that the current ESLint setup rejects.
      - dependency-name: "eslint-plugin-cypress"
        versions: [">=6.0.0"]
      - dependency-name: "eslint-plugin-react-hooks"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@graphql-codegen/typescript-react-query"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "orval"
        versions: ["^7.2.0"]
      - dependency-name: "stylelint-config-recommended-scss"
        update-types: ["version-update:semver-major"]
