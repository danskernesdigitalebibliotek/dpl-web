# Unified Dependabot configuration for DPL Web monorepo
version: 2
updates:
  # GitHub Actions - applies to all workflows in .github/workflows
  - package-ecosystem: github-actions
    directory: "/"
    open-pull-requests-limit: 20
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Europe/Copenhagen
    labels:
      - "dependencies"
      - "github_actions"

  # CMS - Composer dependencies
  - package-ecosystem: composer
    directory: "/cms"
    open-pull-requests-limit: 20
    groups:
      drupal-core-minor-releases:
        patterns:
          - "drupal/core"
          - "drupal/core*"
        update-types:
          - "minor"
      drupal-core-patch-releases:
        patterns:
          - "drupal/core"
          - "drupal/core*"
        update-types:
          - "patch"
    ignore:
      # Never attempt automated updates to major Drupal releases.
      - dependency-name: "drupal/core*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "drupal/potion"
      - dependency-name: "spawnia/sailor"
        versions: [">1.1.0"]
      # drupal/next 2.1.0 adds draft_enabled to exported Next entity config.
      - dependency-name: "drupal/next"
        versions: [">=2.1.0"]
      # Our patches are not compatible with the latest version.
      - dependency-name: "drupal/entity_reference_revisions"
        versions: [">=1.13.0"]
      # Our patches are not compatible with the latest version. See DDFNEXT-1494
      - dependency-name: "drupal/paragraphs_ee"
        versions: [">=10.0.8"]
      # Automated updates to paragraphs also trigger updates to
      # entity_reference_revisions.
      - dependency-name: "drupal/paragraphs"
        versions: [">1.19.0"]
      # Drupal 10.6.x breaks the CMS opening-hours Cypress flow.
      - dependency-name: "drupal/core*"
        versions: [">=10.6.0"]
      # `potion` isn't compatible with newer versions of `annotations`.
      - dependency-name: "doctrine/annotations"
        versions: [">=2.0.0"]
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Europe/Copenhagen
    labels:
      - "dependencies"
      - "cms"
      - "drupal"

  # JavaScript / TypeScript - the whole pnpm workspace (cms, design-system, go,
  # react and packages/*), managed from the workspace root.
  - package-ecosystem: npm
    directory: "/"
    open-pull-requests-limit: 20
    versioning-strategy: increase
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Europe/Copenhagen
    labels:
      - "dependencies"
      - "javascript"
    groups:
      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
      typescript:
        patterns:
          - "typescript"
          - "tsx"
      eslint:
        patterns:
          - "eslint"
          - "@eslint/js"
      prettier:
        patterns:
          - "prettier"
          - "eslint-config-prettier"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      react-query:
        patterns:
          - "@tanstack/react-query"
          - "@tanstack/react-query-devtools"
      redux:
        patterns:
          - "@reduxjs/toolkit"
          - "@types/react-redux"
          - "react-redux"
          - "redux"
          - "redux-persist"
      next:
        patterns:
          - "next"
          - "@next/env"
          - "eslint-config-next"
          - "@next/eslint-plugin-next"
      radix-ui:
        patterns:
          - "@radix-ui/*"
      tailwindcss:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "tailwindcss-animate"
      cva:
        patterns:
          - "class-variance-authority"
          - "clsx"
      xstate:
        patterns:
          - "xstate"
          - "@xstate/*"
      jwt-simple:
        patterns:
          - "jwt-simple"
          - "@types/jwt-simple"
      babel:
        patterns:
          - "@babel/*"
      fullcalendar:
        patterns:
          - "@fullcalendar/*"
      graphql-codegen:
        patterns:
          - "@graphql-codegen/*"
          - "@graphql-typed-document-node/core"
          - "replace-in-file"
          - "typescript-graphql-typed-files-modules"
      storybook:
        patterns:
          - "storybook"
          - "@storybook/*"
          - "eslint-plugin-storybook"
      testing-library:
        patterns:
          - "@testing-library/*"
      cypress:
        patterns:
          - "cypress"
          - "@cypress/*"
    ignore:
      # @types/node tracks the Node version used by the workspace; bump manually
      # when upgrading Node.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # TypeScript majors are upgraded deliberately (cms is on 6, the JS apps and
      # service-layer are on 5).
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # Cypress majors are upgraded deliberately across the workspace.
      - dependency-name: "cypress"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@cypress/code-coverage"
        versions: [">=4.0.0"]
      # The lint stacks still depend on plugins that only support ESLint 8/9.
      - dependency-name: "eslint"
        versions: [">=10.0.0"]
      - dependency-name: "eslint-plugin-cypress"
        versions: [">=6.0.0"]
      - dependency-name: "eslint-plugin-react-hooks"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@chromatic-com/storybook"
        versions: [">=4"]
      # @vitejs/plugin-react 6 expects a newer Vite major than the Go frontend uses.
      - dependency-name: "@vitejs/plugin-react"
        versions: [">=6.0.0"]
      - dependency-name: "dotenv"
        update-types: ["version-update:semver-major"]
      # Vitest 3 changes unit-test asset rendering and timer behaviour in the
      # React snapshot suite.
      - dependency-name: "vitest"
        versions: [">=3.0.0"]
      # DDFNEXT-1501 - conflicts with current setup.
      - dependency-name: "downshift"
        versions: [">=9.0.9"]
      - dependency-name: "stylelint-config-recommended-scss"
        update-types: ["version-update:semver-major"]
      # orval v8 requires breaking config/fetcher changes — upgrade tracked separately.
      - dependency-name: "orval"
        update-types: ["version-update:semver-major"]
      # The pinned GraphQL codegen toolchain peer-requires graphql ^16 and the
      # v6/v7 plugin majors emit colliding types. See DDFNEXT-1455.
      - dependency-name: "graphql"
        versions: [">=17.0.0"]
      - dependency-name: "@graphql-codegen/cli"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@graphql-codegen/client-preset"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@graphql-codegen/schema-ast"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@graphql-codegen/typescript-react-query"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@graphql-codegen/add"
        versions: [">=7.0.0"]
      - dependency-name: "@graphql-codegen/introspection"
        versions: [">=6.0.0"]
      - dependency-name: "@graphql-codegen/typescript"
        versions: [">=6.0.0"]
      - dependency-name: "@graphql-codegen/typescript-operations"
        versions: [">=6.0.0"]
