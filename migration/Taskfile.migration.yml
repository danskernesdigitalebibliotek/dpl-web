version: '3'

vars:
  ORG: danskernesdigitalebibliotek
  MIGRATION_FILE: migration/.migration-info

tasks:
  # --------------------------------------------------------------------------
  # Public Tasks (Entry Points)
  # --------------------------------------------------------------------------

  mono:cms:migrate:commits:
    desc: "Migrate new commits from dpl-cms/develop based on .migration-info"
    silent: true
    vars: { PROJECT: cms, REPO: dpl-cms }
    cmds:
      - task: internal:migrate
        vars: { PROJECT: "{{.PROJECT}}", REPO: "{{.REPO}}" }

  mono:go:migrate:commits:
    desc: "Migrate new commits from dpl-go/develop based on .migration-info"
    silent: true
    vars: { PROJECT: go, REPO: dpl-go }
    cmds:
      - task: internal:migrate
        vars: { PROJECT: "{{.PROJECT}}", REPO: "{{.REPO}}" }

  mono:react:migrate:commits:
    desc: "Migrate new commits from dpl-react/develop based on .migration-info"
    silent: true
    vars: { PROJECT: react, REPO: dpl-react }
    cmds:
      - task: internal:migrate
        vars: { PROJECT: "{{.PROJECT}}", REPO: "{{.REPO}}" }

  mono:design-system:migrate:commits:
    desc: "Migrate new commits from dpl-design-system/develop based on .migration-info"
    silent: true
    vars: { PROJECT: design-system, REPO: dpl-design-system }
    cmds:
      - task: internal:migrate
        vars: { PROJECT: "{{.PROJECT}}", REPO: "{{.REPO}}" }

  mono:migration:update-marker:
    desc: "Update migration marker entry in .migration-info"
    silent: true
    requires:
      vars: [REPO, COMMIT]
    cmds:
      - |
        if [ ! -f "{{.MIGRATION_FILE}}" ]; then
          echo "❌ Error: {{.MIGRATION_FILE}} not found."
          exit 1
        fi

        grep -v "^{{.REPO}}:" {{.MIGRATION_FILE}} > {{.MIGRATION_FILE}}.tmp
        echo "{{.REPO}}:{{.COMMIT}}" >> {{.MIGRATION_FILE}}.tmp
        mv {{.MIGRATION_FILE}}.tmp {{.MIGRATION_FILE}}
        sort -o {{.MIGRATION_FILE}} {{.MIGRATION_FILE}}

  mono:migration:fetch-skip-files:
    desc: "Download and overwrite lock/translation files from each repo's develop branch"
    silent: true
    cmds:
      - |
        set -e
        ORG="{{.ORG}}"
        BRANCH="develop"
        BASE="https://raw.githubusercontent.com/$ORG"

        fetch() {
          REPO="$1"
          SRC="$2"
          DST="$3"
          mkdir -p "$(dirname "$DST")"
          echo "Fetching $DST from $REPO..."
          curl -sLf "$BASE/$REPO/$BRANCH/$SRC" -o "$DST" || { echo "❌ Failed: $REPO $SRC"; exit 1; }
        }

        fetch dpl-cms composer.json cms/composer.json
        fetch dpl-cms composer.lock cms/composer.lock
        fetch dpl-cms yarn.lock cms/yarn.lock
        fetch dpl-cms package.json cms/package.json
        fetch dpl-cms web/profiles/dpl_cms/translations/da.combined.po cms/web/profiles/dpl_cms/translations/da.combined.po
        fetch dpl-go package.json go/package.json
        fetch dpl-go yarn.lock go/yarn.lock
        fetch dpl-design-system package.json design-system/package.json
        fetch dpl-design-system yarn.lock design-system/yarn.lock
        fetch dpl-react package.json react/package.json
        fetch dpl-react yarn.lock react/yarn.lock

        echo "✅ All files updated."

  # --------------------------------------------------------------------------
  # Internal Implementation
  # --------------------------------------------------------------------------

  internal:migrate:
    internal: true
    silent: true
    requires:
      vars: [PROJECT, REPO]
    cmds:
      - |
        set -u
        MIGRATION_FILE="{{.MIGRATION_FILE}}"
        ORG="{{.ORG}}"
        REPO="{{.REPO}}"
        PROJECT="{{.PROJECT}}"
        # Skip-list: any path ending with these filenames (all projects)
        SKIP_FILES_PATTERN="/(composer\.json|composer\.lock|yarn\.lock|da\.combined\.po)$|^(composer\.json|composer\.lock|package\.json|yarn\.lock|da\.combined\.po)$"

        if [ ! -f "$MIGRATION_FILE" ]; then
          echo "❌ Error: $MIGRATION_FILE not found."
          exit 1
        fi

        if [ -d ".git/rebase-apply" ]; then
          echo "❌ Error: An existing 'git am' session is in progress."
          echo ""
          echo "Finish or cancel it before running migration again:"
          echo "  - Resolve conflicts, then run: git am --continue"
          echo "  - Or cancel the session with:  git am --abort"
          exit 1
        fi

        CURRENT_SHA=$(grep "^$REPO:" "$MIGRATION_FILE" | head -1 | cut -d':' -f2 | tr -d '[:space:]')
        if [ -z "$CURRENT_SHA" ]; then
          echo "❌ Error: No entry for '$REPO' in $MIGRATION_FILE"
          exit 1
        fi

        echo "🔍 Checking $REPO from $CURRENT_SHA..."

        COMMITS_DATA=$(gh api "repos/$ORG/$REPO/compare/$CURRENT_SHA...develop" --jq '[.commits[]] | sort_by(.commit.author.date) | .[] | "\(.sha) \(.parents | length)"')
        if [ -z "$COMMITS_DATA" ]; then
          echo "✅ No new commits found."
          exit 0
        fi

        update_migration_marker() {
          REPO_NAME="$1"
          SHA="$2"
          grep -v "^$REPO_NAME:" "$MIGRATION_FILE" > "$MIGRATION_FILE.tmp"
          echo "$REPO_NAME:$SHA" >> "$MIGRATION_FILE.tmp"
          mv "$MIGRATION_FILE.tmp" "$MIGRATION_FILE"
          sort -o "$MIGRATION_FILE" "$MIGRATION_FILE"
        }

        echo "----------------------------------------"

        COMMITS_LIST=$(mktemp)
        echo "$COMMITS_DATA" > "$COMMITS_LIST"

        while IFS= read -r line; do
          COMMIT="${line%% *}"
          PARENT_COUNT=$(echo "$line" | awk '{print $2}')
          [ -z "$COMMIT" ] && continue

          echo "🚀 Migrating $COMMIT..."

          if [ -n "$PARENT_COUNT" ] && [ "$PARENT_COUNT" -gt 1 ] 2>/dev/null; then
            echo "⏭️ Skipping merge commit $COMMIT"
            update_migration_marker "$REPO" "$COMMIT"
            continue
          fi

          PATCH_URL="https://github.com/$ORG/$REPO/commit/$COMMIT.patch"
          PATCH_FILE=$(mktemp)
          if ! curl -sLf "$PATCH_URL" > "$PATCH_FILE" || [ ! -s "$PATCH_FILE" ]; then
            rm -f "$PATCH_FILE"
            echo "❌ Failed to fetch patch for $COMMIT"
            rm -f "$COMMITS_LIST"
            exit 1
          fi
          if ! grep -qE '^diff --git |^From ' "$PATCH_FILE"; then
            rm -f "$PATCH_FILE"
            echo "❌ Invalid patch content for $COMMIT"
            rm -f "$COMMITS_LIST"
            exit 1
          fi

          COMMIT_FILES=$(sed -n 's/^diff --git a\/\(.*\) b\/.*/\1/p' < "$PATCH_FILE" | sort -u)
          if [ -n "$COMMIT_FILES" ]; then
            SKIP_THIS=1
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              echo "$f" | grep -qE "$SKIP_FILES_PATTERN" || { SKIP_THIS=0; break; }
            done <<< "$COMMIT_FILES"
            if [ "$SKIP_THIS" -eq 1 ]; then
              rm -f "$PATCH_FILE"
              echo "⏭️ Skipping $COMMIT (only touches composer.json, composer.lock, yarn.lock, or da.combined.po; will handle manually)."
              update_migration_marker "$REPO" "$COMMIT"
              continue
            fi
          fi

          AM_LOG=$(mktemp)

          if ! cat "$PATCH_FILE" | git am --directory="$PROJECT" -3 --committer-date-is-author-date >"$AM_LOG" 2>&1; then
            [ -s "$AM_LOG" ] && cat "$AM_LOG"

            # Missing patch context (no conflict markers; git can't build 3-way merge). Skip and continue so we don't loop.
            if grep -qE "sha1 information is lacking or useless|could not build fake ancestor|missing patch ancestor context" "$AM_LOG"; then
              echo ""
              echo "⚠️ Skipping $COMMIT (patch context missing – no conflict markers; apply manually from source repo if needed)."
              if ! git am --skip; then
                rm -f "$AM_LOG" "$PATCH_FILE" "$COMMITS_LIST"
                echo "❌ Failed to skip. Resolve manually: git am --skip or git am --abort"
                exit 1
              fi
              echo "💾 Updating $MIGRATION_FILE to skipped commit: $COMMIT"
              update_migration_marker "$REPO" "$COMMIT"
              rm -f "$AM_LOG" "$PATCH_FILE"
              continue
            fi

            # Auto-skip only if this patch touches ONLY skip-list files and conflict is only in those files
            PATCH_FILES=$(sed -n 's/^diff --git a\/\(.*\) b\/.*/\1/p' < "$PATCH_FILE" | sort -u)
            PATCH_ONLY_SKIP=1
            if [ -n "$PATCH_FILES" ]; then
              while IFS= read -r f; do
                [ -z "$f" ] && continue
                echo "$f" | grep -qE "$SKIP_FILES_PATTERN" || { PATCH_ONLY_SKIP=0; break; }
              done <<< "$PATCH_FILES"
            fi

            UNMERGED=$(git diff --name-only --diff-filter=U 2>/dev/null || true)
            AUTO_SKIP=0
            if [ "$PATCH_ONLY_SKIP" -eq 1 ] && [ -n "$UNMERGED" ]; then
              AUTO_SKIP=1
              while IFS= read -r p; do
                [ -z "$p" ] && continue
                echo "$p" | grep -qE "$SKIP_FILES_PATTERN" || { AUTO_SKIP=0; break; }
              done <<< "$UNMERGED"
            fi

            if [ "$AUTO_SKIP" -eq 1 ]; then
              echo ""
              echo "⏭️ Conflict only in skip-list files; skipping this patch segment."
              if ! git am --skip; then
                rm -f "$AM_LOG" "$PATCH_FILE" "$COMMITS_LIST"
                echo "❌ Failed to skip. Resolve manually: git am --skip or git am --abort"
                exit 1
              fi
              echo "💾 Updating $MIGRATION_FILE to commit: $COMMIT"
              update_migration_marker "$REPO" "$COMMIT"
              rm -f "$AM_LOG" "$PATCH_FILE"
            else
              rm -f "$AM_LOG" "$PATCH_FILE" "$COMMITS_LIST"
              echo ""
              echo "❌ Patch failed (commit $COMMIT from $REPO)."
              echo ""
              echo "This can be a merge conflict or missing patch context (e.g. sha1 information is lacking)."
              echo ""
              echo "Recovery options:"
              echo "  1) Resolve conflicts (if any):  git status, edit files, git add <files>, git am --continue"
              echo "  2) Skip this patch and move on:  git am --skip"
              echo "     Then update marker:          task migration:mono:migration:update-marker REPO=$REPO COMMIT=$COMMIT"
              echo "  3) Abort and retry later:       git am --abort"
              echo ""
              echo "After 1 or 2, re-run the migration task to continue."
              exit 1
            fi
            continue
          fi

          [ -s "$AM_LOG" ] && cat "$AM_LOG"
          rm -f "$AM_LOG" "$PATCH_FILE"

          echo "💾 Updating $MIGRATION_FILE to latest successful commit: $COMMIT"
          update_migration_marker "$REPO" "$COMMIT"
        done < "$COMMITS_LIST"

        rm -f "$COMMITS_LIST"
        echo "🎉 All commits migrated successfully!"
