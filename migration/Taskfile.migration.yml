version: '3'

vars:
  ORG: danskernesdigitalebibliotek
  MIGRATION_FILE: migration/.migration-info

tasks:
  # --------------------------------------------------------------------------
  # Public Tasks (Entry Points)
  # --------------------------------------------------------------------------

  mono:cms:migrate:commits:
    desc: "Migrate new commits from dpl-cms/develop based on .migration-info"
    silent: true
    vars: { PROJECT: cms, REPO: dpl-cms }
    cmds:
      - task: internal:migrate
        vars: { PROJECT: "{{.PROJECT}}", REPO: "{{.REPO}}" }

  mono:go:migrate:commits:
    desc: "Migrate new commits from dpl-go/develop based on .migration-info"
    silent: true
    vars: { PROJECT: go, REPO: dpl-go }
    cmds:
      - task: internal:migrate
        vars: { PROJECT: "{{.PROJECT}}", REPO: "{{.REPO}}" }

  mono:react:migrate:commits:
    desc: "Migrate new commits from dpl-react/develop based on .migration-info"
    silent: true
    vars: { PROJECT: react, REPO: dpl-react }
    cmds:
      - task: internal:migrate
        vars: { PROJECT: "{{.PROJECT}}", REPO: "{{.REPO}}" }

  mono:design-system:migrate:commits:
    desc: "Migrate new commits from dpl-design-system/develop based on .migration-info"
    silent: true
    vars: { PROJECT: design-system, REPO: dpl-design-system }
    cmds:
      - task: internal:migrate
        vars: { PROJECT: "{{.PROJECT}}", REPO: "{{.REPO}}" }

  mono:migration:update-marker:
    desc: "Update migration marker entry in .migration-info"
    silent: true
    requires:
      vars: [REPO, COMMIT]
    cmds:
      - |
        if [ ! -f "{{.MIGRATION_FILE}}" ]; then
          echo "❌ Error: {{.MIGRATION_FILE}} not found."
          exit 1
        fi

        grep -v "^{{.REPO}}:" {{.MIGRATION_FILE}} > {{.MIGRATION_FILE}}.tmp
        echo "{{.REPO}}:{{.COMMIT}}" >> {{.MIGRATION_FILE}}.tmp
        mv {{.MIGRATION_FILE}}.tmp {{.MIGRATION_FILE}}
        sort -o {{.MIGRATION_FILE}} {{.MIGRATION_FILE}}

  # --------------------------------------------------------------------------
  # Internal Implementation
  # --------------------------------------------------------------------------

  internal:migrate:
    internal: true
    silent: true
    requires:
      vars: [PROJECT, REPO]
    cmds:
      - |
        if [ ! -f "{{.MIGRATION_FILE}}" ]; then
          echo "❌ Error: {{.MIGRATION_FILE}} not found."
          exit 1
        fi

        if [ -d ".git/rebase-apply" ]; then
          echo "❌ Error: An existing 'git am' session is in progress."
          echo ""
          echo "Finish or cancel it before running migration again:"
          echo "  - Resolve conflicts, then run: git am --continue"
          echo "  - Or cancel the session with:  git am --abort"
          exit 1
        fi

        # Get Current SHA
        CURRENT_SHA=$(grep "^{{.REPO}}:" {{.MIGRATION_FILE}} | cut -d':' -f2 | tr -d '[:space:]')
        if [ -z "$CURRENT_SHA" ]; then
          echo "❌ Error: No entry for '{{.REPO}}' in {{.MIGRATION_FILE}}"
          exit 1
        fi

        echo "🔍 Checking {{.REPO}} from $CURRENT_SHA..."

        # Get Commits
        COMMITS=$(gh api "repos/{{.ORG}}/{{.REPO}}/compare/$CURRENT_SHA...develop" --jq '.commits[].sha')

        if [ -z "$COMMITS" ]; then
          echo "✅ No new commits found."
          exit 0
        fi

        update_migration_marker() {
          REPO_NAME="$1"
          SHA="$2"
          grep -v "^$REPO_NAME:" {{.MIGRATION_FILE}} > {{.MIGRATION_FILE}}.tmp
          echo "$REPO_NAME:$SHA" >> {{.MIGRATION_FILE}}.tmp
          mv {{.MIGRATION_FILE}}.tmp {{.MIGRATION_FILE}}
          sort -o {{.MIGRATION_FILE}} {{.MIGRATION_FILE}}
        }

        auto_continue_am_preferring_theirs() {
          FORCED_THEIRS=0
          while true; do
            if git am --continue >"$AM_LOG" 2>&1; then
              return 0
            fi

            # Include add/add and other unmerged; git diff -U can miss some
            UNMERGED_FILES=$( ( git diff --name-only --diff-filter=U; git ls-files -u | cut -f2 ) | sort -u )
            if [ -n "$UNMERGED_FILES" ]; then
              echo "↪ Taking incoming changes (theirs) for conflicted files..."
              for FILE in $UNMERGED_FILES; do
                git checkout --theirs -- "$FILE"
                git add "$FILE"
              done
              FORCED_THEIRS=0
              continue
            fi

            # No unmerged: skip empty patch, or once force patch to win over whole project dir
            if git am --skip >"$AM_LOG" 2>&1; then
              echo "↪ Skipped empty or inapplicable patch; continuing..."
              FORCED_THEIRS=0
              continue
            fi
            if [ "$FORCED_THEIRS" -eq 1 ]; then
              return 1
            fi
            echo "↪ Forcing incoming changes (theirs) for {{.PROJECT}}/ and continuing..."
            git checkout --theirs -- {{.PROJECT}}/
            git add {{.PROJECT}}/
            FORCED_THEIRS=1
          done
        }

        echo "----------------------------------------"

        # Apply Patches
        for COMMIT in $COMMITS; do
          echo "🚀 Migrating $COMMIT..."

          PATCH_URL="https://github.com/{{.ORG}}/{{.REPO}}/commit/$COMMIT.patch"
          AM_LOG=$(mktemp)
          SKIP_COMMIT=0

          if ! curl -sL "$PATCH_URL" | git am --directory={{.PROJECT}} -3 --committer-date-is-author-date >"$AM_LOG" 2>&1; then
            if [ -s "$AM_LOG" ]; then
              cat "$AM_LOG"
            fi

            if grep -q "sha1 information is lacking or useless" "$AM_LOG" || grep -q "could not build fake ancestor" "$AM_LOG"; then
              echo ""
              echo "⚠️ Auto-skipping commit $COMMIT due to missing patch ancestor context."
              if ! git am --skip; then
                rm -f "$AM_LOG"
                echo "❌ Failed to auto-skip. Resolve manually with: git am --continue, git am --skip, or git am --abort"
                exit 1
              fi

              echo "💾 Updating {{.MIGRATION_FILE}} to skipped commit: $COMMIT"
              update_migration_marker "{{.REPO}}" "$COMMIT"
              SKIP_COMMIT=1
            else
              echo ""
              echo "⚠️ Conflict while applying commit $COMMIT from {{.REPO}}."
              echo "↪ Attempting auto-resolve by preferring incoming changes (theirs)..."

              if ! auto_continue_am_preferring_theirs; then
                if [ -s "$AM_LOG" ]; then
                  cat "$AM_LOG"
                fi
                rm -f "$AM_LOG"
                echo ""
                echo "❌ Auto-resolve failed for commit $COMMIT."
                echo ""
                echo "Recovery steps:"
                echo "  1) Resolve conflicts shown by: git status"
                echo "  2) Stage resolved files:      git add <files>"
                echo "  3) Continue apply:            git am --continue (or git am --skip)"
                echo "  4) Update migration marker with:"
                echo "     task migration:mono:migration:update-marker REPO={{.REPO}} COMMIT=$COMMIT"
                echo "  5) Re-run the migration task to continue with remaining commits."
                echo ""
                echo "To cancel instead, run: git am --abort"
                exit 1
              fi
            fi
          fi

          if [ "$SKIP_COMMIT" -eq 1 ]; then
            rm -f "$AM_LOG"
            continue
          fi

          if [ -s "$AM_LOG" ]; then
            cat "$AM_LOG"
          fi
          rm -f "$AM_LOG"

          echo "💾 Updating {{.MIGRATION_FILE}} to latest successful commit: $COMMIT"
          update_migration_marker "{{.REPO}}" "$COMMIT"
        done

        echo "🎉 All commits migrated successfully!"
