packages:
  - cms
  - design-system
  - go
  - packages/*
  - react

overrides:
  "@types/react": "19.2.17"
  "@types/react-dom": "19.2.3"

# Whitelist of packages that are allowed to run build scripts.
onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@playwright/browser-chromium'
  - '@swc/core'
  - core-js
  - core-js-pure
  - cypress
  - esbuild
  - puppeteer
  - sharp
  - unrs-resolver

# To mitigate the risk of supply chain attacks, wait two days before accepting
# a new version of a package.
minimumReleaseAge: 2880

# Another supply chain risk mitigation: https://pnpm.io/settings#blockexoticsubdeps
blockExoticSubdeps: true
