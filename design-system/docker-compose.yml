# This block is used for inclusion in the environment section of each container.
x-volumes:
  &default-volumes
    # Define all volumes you would like to have real-time mounted into the docker containers
    volumes:
      - 'projectroot:/home/node/app'

services:
  node:
  # Remember to keep version updated with the .nvmrc file.
  # The .nvmrc file is used in Github Actions and for "dockerless" development.
    image: node:24
    user: root
    init: true
    working_dir: /home/node/app
    <<: [*default-volumes]
    labels:
      dev.orbstack.domains: ${COMPOSE_PROJECT_NAME}.local
    expose:
      - 80
    command: 'yarn dev'
    environment:
      VIRTUAL_HOST: ${COMPOSE_PROJECT_NAME}.local
      VIRTUAL_PORT: 6006
      STORYBOOK_CLIENT_ID: bdc1d425-9117-4867-acb9-c7307ddc2e0f
      SHELL: /bin/sh

  playwright:
    image: mcr.microsoft.com/playwright:v1.59.1
    working_dir: /home/node/app
    <<: [*default-volumes]
    profiles:
      - test

volumes:
  projectroot:
    driver_opts:
      type: none
      device: $PWD
      o: bind
