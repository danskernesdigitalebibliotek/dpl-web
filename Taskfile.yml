version: '3'

output: prefixed

vars:
  CMS_DESIGN_SYSTEM_ASSETS: ./cms/web/themes/custom/novel/assets/dpl-design-system
  CMS_REACT_LIBRARY: ./cms/web/libraries/dpl-react
  DESIGN_SYSTEM_BUILD: ./design-system/build

tasks:
  # ---------------------------------------------------------------------------
  # CI
  # ---------------------------------------------------------------------------

  ci:actionlint:
    summary: Lint GitHub Actions workflows with actionlint
    cmds:
      - docker run --rm --volume "{{.TASKFILE_DIR}}:/repo:ro" --workdir /repo rhysd/actionlint:latest -color

  # ---------------------------------------------------------------------------
  # Tokens
  # ---------------------------------------------------------------------------

  token:generate:
    desc: "Generate a new library token from Adgangsplatformen and write it to every *LIBRARY_TOKEN entry in first-level .env files"
    dotenv: ['.env']
    silent: true
    cmds:
      - |
        set -eu
        : "${ADGANGSPLATFORMEN_CLIENT_ID:?missing in root .env}"
        : "${ADGANGSPLATFORMEN_CLIENT_SECRET:?missing in root .env}"
        : "${ADGANGSPLATFORMEN_AGENCY_ID:?missing in root .env}"

        echo "Requesting new library token from login.bib.dk..."
        response=$(curl -sS -X POST "https://login.bib.dk/oauth/token" \
          -H "Content-Type: application/x-www-form-urlencoded" \
          --data-urlencode "grant_type=password" \
          --data-urlencode "client_id=${ADGANGSPLATFORMEN_CLIENT_ID}" \
          --data-urlencode "client_secret=${ADGANGSPLATFORMEN_CLIENT_SECRET}" \
          --data-urlencode "username=@${ADGANGSPLATFORMEN_AGENCY_ID}" \
          --data-urlencode "password=@${ADGANGSPLATFORMEN_AGENCY_ID}")

        token=$(echo "$response" | jq -r .access_token)
        if [ -z "$token" ] || [ "$token" = "null" ]; then
          echo "Failed to obtain access token. Response:" >&2
          echo "$response" >&2
          exit 1
        fi

        if ! command -v perl >/dev/null 2>&1; then
          echo "perl not found on PATH — skipping automatic .env updates."
          echo "Paste the token below into the *LIBRARY_TOKEN entries of your .env files manually."
        else
          updated=0
          for envfile in */.env; do
            [ -f "$envfile" ] || continue
            if grep -qE '^[A-Za-z_][A-Za-z0-9_]*LIBRARY_TOKEN=' "$envfile"; then
              TOKEN="$token" perl -i -pe 's/^([A-Za-z_][A-Za-z0-9_]*LIBRARY_TOKEN)=.*$/$1=$ENV{TOKEN}/' "$envfile"
              echo "  updated $envfile"
              updated=$((updated + 1))
            fi
          done

          if [ "$updated" -eq 0 ]; then
            echo "No *LIBRARY_TOKEN entries found in first-level .env files." >&2
          else
            echo "Done. Updated $updated file(s)."
          fi
        fi

        echo
        echo "Token:"
        echo "$token"

  # ---------------------------------------------------------------------------
  # Sub-project starters (delegates to each project's own Taskfile)
  # ---------------------------------------------------------------------------

  cms:start:
    desc: "Start CMS Docker containers (without resetting)"
    cmds:
      - task -d cms dev:start
      - task -d cms dev:cli -- drush user-login

  cms:reset:
    desc: "Reset CMS dev environment from scratch (runs cms/Taskfile.yml dev:reset)"
    cmds:
      - task -d cms dev:reset

  cms:watch:
    desc: "Watch CMS source for changes and clear cache"
    cmds:
      - task -d cms dev:watch

  react:start:
    desc: "Start React dev environment (runs react/Taskfile.yml dev:start)"
    cmds:
      - task -d react dev:start

  design-system:start:
    desc: "Start design-system dev environment (runs design-system/Taskfile.yml dev:start)"
    cmds:
      - task -d design-system dev:start

  go:reset:
    desc: "Reset Go dev environment (runs go/Taskfile.yml dev:reset)"
    cmds:
      - task -d go dev:reset

  # ---------------------------------------------------------------------------
  # Init (pnpm install for all JS projects)
  # ---------------------------------------------------------------------------

  init:pnpm:
    desc: "Install dependencies with pnpm"
    sources:
      - "**/package.json"
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
    cmds:
      - corepack pnpm install

  # ---------------------------------------------------------------------------
  # Main orchestration
  # ---------------------------------------------------------------------------

  dev:cms-react:
    desc: "Build design-system + React, copy into CMS. Use --watch for live-reload."
    deps:
      - cms:start
      - dev:react:setup
    cmds:
      - task: dev:cms:link

  # ---------------------------------------------------------------------------
  # Design-system
  # ---------------------------------------------------------------------------

  dev:design-system:build:
    desc: "Build design-system (sass + bundle into build/)"
    deps:
      - init:pnpm
    dir: ./design-system
    sources:
      - 'src/**/*.scss'
      - 'src/**/*.js'
      - 'public/icons/**/*'
      - 'base.scss'
      - 'wysiwyg.scss'
      - 'admin-base.scss'
    generates:
      - 'build/**/*.*'
    cmds:
      # pnpm run build compiles SCSS into src/styles/css/.
      # We then assemble a clean build/ directory with the assets CMS needs.
      - pnpm run build
      - rm -rf ./build
      - mkdir -p ./build/js
      - cp -r ./public/icons ./build/icons
      - cp -r ./src/styles/css ./build/css
      - cp -r ./src/styles/fonts ./build/fonts
      - find ./src -name "*.js" | while read -r f; do cp "$f" ./build/js/"$(basename "$f")"; done

  # ---------------------------------------------------------------------------
  # React
  # ---------------------------------------------------------------------------

  dev:react:setup:
    desc: "Build design-system and React"
    cmds:
      - task: dev:design-system:build
      - task: dev:react:build

  dev:react:build:
    desc: "Build React (pnpm build → dist/)"
    deps:
      - init:pnpm
    dir: ./react
    sources:
      - 'src/**/*.ts'
      - 'src/**/*.tsx'
      - 'src/**/*.js'
      - 'src/**/*.jsx'
      - 'src/**/*.scss'
      - 'webpack.config.js'
      - 'webpack.helpers.js'
    generates:
      - 'dist/**/*.*'
    cmds:
      - pnpm build

  # ---------------------------------------------------------------------------
  # Copy assets into CMS
  # ---------------------------------------------------------------------------

  dev:cms:link:
    desc: "Copy design-system + React build artifacts into CMS directories and clear cache"
    deps:
      - dev:cms:link:design-system
      - dev:cms:link:react
    cmds:
      - task -d cms dev:cache:clear:all

  dev:cms:link:design-system:
    desc: "Copy design-system build into CMS theme assets"
    deps:
      - dev:design-system:build
    cmds:
      - rm -rf {{ .CMS_DESIGN_SYSTEM_ASSETS }}
      - mkdir -p {{ .CMS_DESIGN_SYSTEM_ASSETS }}
      - cp -r {{ .DESIGN_SYSTEM_BUILD }}/css {{ .CMS_DESIGN_SYSTEM_ASSETS }}/css
      - cp -r {{ .DESIGN_SYSTEM_BUILD }}/js {{ .CMS_DESIGN_SYSTEM_ASSETS }}/js
      - cp -r {{ .DESIGN_SYSTEM_BUILD }}/icons {{ .CMS_DESIGN_SYSTEM_ASSETS }}/icons
      - cp -r {{ .DESIGN_SYSTEM_BUILD }}/fonts {{ .CMS_DESIGN_SYSTEM_ASSETS }}/fonts

  dev:cms:link:react:
    desc: "Copy React dist into CMS libraries"
    deps:
      - dev:react:build
    cmds:
      - rm -rf {{ .CMS_REACT_LIBRARY }}
      - mkdir -p {{ .CMS_REACT_LIBRARY }}
      - cp -r ./react/dist/* {{ .CMS_REACT_LIBRARY }}/

  dev:reset:node_modules:
    desc: "Remove node_modules from all projects and reinstall with pnpm."
    cmds:
      - "rm -rf node_modules **/node_modules"
      - task: init:pnpm

  lagoon:run-on-projects:
    desc: Show how to run shell commands across many Lagoon projects in parallel
    silent: true
    cmds:
      - |
        cat <<'EOF'
        run-on-projects.sh — run shell commands across many Lagoon projects.

        The tool lives in:  cms/tools/lagoon-commands/

          1. cd cms/tools/lagoon-commands
          2. Edit projects.txt   (one project per line)
          3. Edit commands.txt   (one shell command per line, {project} is replaced)
          4. ./run-on-projects.sh           # default: 3 in parallel
             ./run-on-projects.sh --dry-run # preview without running
             ./run-on-projects.sh -h        # all flags

        Per-project output goes to logs/<timestamp>/<project>.log.
        See cms/tools/lagoon-commands/README.md for full docs.
        EOF
