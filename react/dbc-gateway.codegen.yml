overwrite: true
schema: "../schemas/graphql/dbc-fbi.temp-next.graphql"
documents: "src/**/*.graphql"
generates:
  src/core/dbc-gateway/generated/graphql.ts:
    config:
      fetcher:
        func: "../graphql-fetcher#fetcher"
      defaultScalarType: unknown
      identifierName: operationNames
      useConsts: true
      legacyMode: true
    plugins:
      - "typescript"
      - "typescript-operations"
      - "typescript-react-query"
      - "named-operations-object"
    hooks:
      afterOneFileWrite:
        - pnpm run post-process-generated-graphql
        - pnpm exec eslint --fix
  src/core/dbc-gateway/generated/graphql.schema.json:
    plugins:
      - "introspection"
