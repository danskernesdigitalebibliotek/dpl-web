version: "3"

# packages/service-layer is a pnpm workspace package consumed by other
# sub-projects. The only codegen it owns is the internal FBS adapter,
# which reads /schemas/openapi/fbs-adapter.yaml.

tasks:
  codegen:fbs:
    desc: Regenerate the internal FBS adapter from /schemas/openapi/fbs-adapter.yaml
    cmds:
      - pnpm run codegen:fbs
