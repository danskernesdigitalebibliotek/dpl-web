version: '3'

# Refresh tasks for the contracts under openapi/ and graphql/.
# Codgen lives in each consuming sub-project — see README.

vars:
  FBS_TOOL_REPO: https://github.com/itk-dev/dpl-fbs-adapter-tool.git
  FBS_TOOL_REF: develop
  FBS_TOOL_DIR: .cache/dpl-fbs-adapter-tool

  # Pinned dockerized toolchain — keeps schemas/ self-contained, no
  # reach-in to sibling sub-projects. Prettier and graphql-inspector
  # both run as ephemeral `npx` invocations inside `node:22-alpine`;
  # nothing is installed locally. (Note: kamilkisiela/graphql-inspector
  # docker images are broken — v3.4.0 has a buggy undici, master is
  # missing internal loader deps — so we run the npm package directly.)
  NODE_IMAGE: node:22-alpine
  PRETTIER_VERSION: 3.8.3
  GRAPHQL_INSPECTOR_VERSION: 6.0.7

  # DBC FBI gateway endpoints. Names = host+profile, see README.
  DBC_FBI_TEMP_NEXT_URL: https://temp.fbi-api.dbc.dk/next/graphql
  DBC_FBI_FBCMS_GO_URL: https://fbi-api.dbc.dk/fbcms-go/graphql

tasks:

  _introspect-fbi:
    internal: true
    dir: '{{.TASKFILE_DIR}}'
    requires:
      vars: [URL, OUT]
    cmds:
      - |
        # Task forbids `dotenv:` in included Taskfiles, so source .env
        # inline. Safe here — .env only carries LIBRARY_TOKEN.
        if [ -f .env ]; then set -a; . ./.env; set +a; fi
        if [ -z "${LIBRARY_TOKEN:-}" ]; then
          echo "refresh:dbc-fbi: \$LIBRARY_TOKEN not set — copy schemas/.env.example to schemas/.env and fill it in." >&2
          exit 1
        fi
        docker run --rm \
          --volume "$(pwd):/work" \
          --workdir /work \
          "{{.NODE_IMAGE}}" \
          npx --yes --package="@graphql-inspector/cli@{{.GRAPHQL_INSPECTOR_VERSION}}" -- \
            graphql-inspector introspect "{{.URL}}" \
            --write "{{.OUT}}" \
            --header "Authorization: Bearer $LIBRARY_TOKEN"

  format:
    desc: Normalize whitespace and quote style in openapi/ and graphql/ via prettier (dockerized).
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - |
        docker run --rm \
          --volume "$(pwd):/work" \
          --workdir /work \
          "{{.NODE_IMAGE}}" \
          npx --yes "prettier@{{.PRETTIER_VERSION}}" --write openapi graphql

  refresh:material-list:
    desc: Refresh openapi/material-list.yaml from upstream ddb-material-list (latest spec/material-list-X.Y.Z.yaml on develop).
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - |
        api='https://api.github.com/repos/danskernesdigitalebibliotek/ddb-material-list/contents/spec?ref=develop'
        latest=$(curl -sSfL "$api" \
          | grep -oE 'material-list-[0-9]+\.[0-9]+\.[0-9]+\.yaml' \
          | sort -V -u \
          | tail -n1)
        if [ -z "$latest" ]; then
          echo "refresh:material-list: could not determine latest spec version from $api" >&2
          exit 1
        fi
        echo "refresh:material-list: using $latest"
        curl -sSfL "https://raw.githubusercontent.com/danskernesdigitalebibliotek/ddb-material-list/develop/spec/$latest" -o openapi/material-list.yaml

  refresh:fbs:
    desc: Regenerate openapi/fbs-adapter.yaml via the dpl-fbs-adapter-tool. Needs docker, git, task.
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - mkdir -p .cache
      - |
        if [ -d "{{.FBS_TOOL_DIR}}/.git" ]; then
          git -C "{{.FBS_TOOL_DIR}}" fetch --depth=1 origin "{{.FBS_TOOL_REF}}"
          git -C "{{.FBS_TOOL_DIR}}" reset --hard "origin/{{.FBS_TOOL_REF}}"
        else
          git clone --depth=1 -b "{{.FBS_TOOL_REF}}" "{{.FBS_TOOL_REPO}}" "{{.FBS_TOOL_DIR}}"
        fi
      - task -d "{{.FBS_TOOL_DIR}}" dev:install
      - task -d "{{.FBS_TOOL_DIR}}" dev:swagger2yaml
      - task -d "{{.FBS_TOOL_DIR}}" dev:convert
      - cp "{{.FBS_TOOL_DIR}}/fbs-adapter.yaml" openapi/fbs-adapter.yaml
      - task: format

  refresh:dbc-fbi:temp-next:
    desc: Refresh graphql/dbc-fbi.temp-next.graphql from temp.fbi-api.dbc.dk/next.
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - task: _introspect-fbi
        vars:
          URL: '{{.DBC_FBI_TEMP_NEXT_URL}}'
          OUT: graphql/dbc-fbi.temp-next.graphql
      - task: format

  refresh:dbc-fbi:fbcms-go:
    desc: Refresh graphql/dbc-fbi.fbcms-go.graphql from fbi-api.dbc.dk/fbcms-go.
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - task: _introspect-fbi
        vars:
          URL: '{{.DBC_FBI_FBCMS_GO_URL}}'
          OUT: graphql/dbc-fbi.fbcms-go.graphql
      - task: format

  refresh:dbc-fbi:
    desc: Refresh both DBC FBI snapshots (temp-next + fbcms-go).
    cmds:
      - task: refresh:dbc-fbi:temp-next
      - task: refresh:dbc-fbi:fbcms-go

  refresh:publizon:
    desc: "Stub: publizon-adapter.yaml has no automated upstream. Edit it by hand."
    cmds:
      - cmd: |
          echo "publizon-adapter.yaml has no upstream — edit it by hand and re-run codegen in each consuming project." >&2
        silent: true

  refresh:
    desc: Run every refresh task that has an automated upstream.
    cmds:
      - task: refresh:material-list
      - task: refresh:fbs
      - task: refresh:dbc-fbi
      - task refresh:publizon
